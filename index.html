<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SG Achslach-Gotteszell – Jugend</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a3d8f;--blue-mid:#2251b8;--blue-light:#3a6bdf;
  --blue-pale:#e8eefb;--blue-ultra:#f0f4fd;
  --white:#fff;--gold:#e8a020;--gold-pale:#fff8e6;
  --red:#c0392b;--red-pale:#fdecea;
  --g-dark:#1a1a2e;--g:#3d3d5c;--g-mid:#6b6b8a;--g-light:#a0a0b8;
  --g-border:#e2e4f0;--g-bg:#f6f7fb;--g-ultra:#fafbff;
  --sh:0 2px 8px rgba(26,61,143,.10);--sh-lg:0 8px 32px rgba(26,61,143,.15);
  --r:10px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--g-bg);color:var(--g-dark);min-height:100vh;}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 100%);color:#fff;padding:0 24px;display:flex;align-items:center;gap:14px;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(26,61,143,.35);}
.hdr-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5);flex-shrink:0;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.hdr-logo:hover{transform:scale(1.08);box-shadow:0 0 0 4px rgba(255,255,255,.25);}
.hdr-brand .title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1.1;}
.hdr-brand .sub{font-size:10px;opacity:.7;letter-spacing:.8px;text-transform:uppercase;}
.hdr-nav{margin-left:auto;display:flex;align-items:center;gap:4px;}
.nb{padding:7px 14px;border-radius:20px;border:none;background:rgba(255,255,255,.12);color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap;}
.nb:hover,.nb.active{background:rgba(255,255,255,.28);}
.trainer-chip{font-size:11px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-weight:500;}

/* SEASON BAR */
.sbar{background:#fff;border-bottom:1px solid var(--g-border);padding:10px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(26,61,143,.06);}
.sbar-lbl{font-size:11px;font-weight:700;color:var(--g-light);text-transform:uppercase;letter-spacing:.6px;}
.s-sel{padding:7px 14px;border-radius:8px;border:2px solid var(--g-border);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;background:#fff;color:var(--g-dark);cursor:pointer;outline:none;min-width:190px;transition:border-color .15s;}
.s-sel:focus{border-color:var(--blue-light);}
.s-meta{font-size:12px;color:var(--g-light);font-weight:500;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:20px;background:linear-gradient(160deg,var(--blue-ultra) 0%,var(--g-bg) 100%);}
.login-card{background:#fff;border-radius:var(--r-lg);padding:40px;box-shadow:var(--sh-lg);width:100%;max-width:400px;border-top:4px solid var(--blue-mid);}
.login-card .logo-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.login-card img{width:90px;height:90px;object-fit:contain;}
.login-card h2{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:4px;}
.login-card p{text-align:center;font-size:13px;color:var(--g-light);margin-bottom:28px;font-weight:500;}
.flbl{font-size:11px;font-weight:700;color:var(--g-mid);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px;}
.finp{width:100%;padding:11px 14px;border-radius:8px;border:2px solid var(--g-border);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .15s;color:var(--g-dark);margin-bottom:16px;}
.finp:focus{border-color:var(--blue-mid);}
.btn-main{width:100%;padding:13px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--blue-mid),var(--blue-light));color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 14px rgba(34,81,184,.4);transition:opacity .15s;}
.btn-main:hover{opacity:.9;}
.btn-main:disabled{opacity:.5;cursor:not-allowed;}
.err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;font-weight:500;}
.parent-btn{width:100%;margin-top:14px;padding:10px;border-radius:8px;border:2px solid var(--g-border);background:#fff;font-family:'Barlow',sans-serif;font-size:13px;color:var(--g-mid);font-weight:500;cursor:pointer;transition:all .15s;}
.parent-btn:hover{border-color:var(--blue-light);color:var(--blue);}

/* CONTENT */
.content{padding:24px;max-width:1140px;margin:0 auto;}
.view{display:none;}.view.active{display:block;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:#fff;border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);border-left:4px solid var(--blue-mid);transition:transform .15s,box-shadow .15s;}
.sc:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.sc .lbl{font-size:10px;font-weight:700;color:var(--g-light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.sc .val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--blue);line-height:1;}
.sc .sub{font-size:11px;color:var(--g-light);margin-top:4px;font-weight:500;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.srch-wrap{position:relative;flex:1;min-width:160px;}
.srch-wrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;}
.srch{width:100%;padding:9px 12px 9px 34px;border-radius:8px;border:2px solid var(--g-border);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
.srch:focus{border-color:var(--blue-light);}
.fb{padding:8px 14px;border-radius:8px;border:2px solid var(--g-border);background:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--g-mid);transition:all .15s;}
.fb:hover{border-color:var(--blue-light);color:var(--blue);}
.fb.active{background:var(--blue-pale);border-color:var(--blue-mid);color:var(--blue);}
.ab{padding:8px 16px;border-radius:8px;border:none;background:var(--blue-mid);color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.ab:hover{background:var(--blue-light);}
.ab.amber{background:#c87a00;}.ab.amber:hover{background:var(--gold);}
.ab.slate{background:#5a6380;}.ab.slate:hover{background:#6b75a0;}

/* TABLE */
.tcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--blue);color:#fff;}
th{padding:10px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
tbody tr{border-bottom:1px solid var(--g-border);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--blue-ultra);}
td{padding:10px 14px;vertical-align:middle;}
.pname{font-weight:600;}
.p-init{width:34px;height:34px;border-radius:50%;background:var(--blue-pale);color:var(--blue-mid);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}
.p-thumb{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--g-border);}
.pct-bar{display:flex;align-items:center;gap:8px;}
.bt{flex:1;height:6px;background:var(--g-border);border-radius:3px;overflow:hidden;max-width:80px;}
.bf{height:100%;border-radius:3px;}
.bg{background:linear-gradient(90deg,#1a8a3d,#2eb857);}
.bm{background:linear-gradient(90deg,#c87a00,var(--gold));}
.bl{background:linear-gradient(90deg,#a32020,var(--red));}
.pv{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--g);min-width:36px;}
.pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}
.pill-g{background:var(--gold-pale);color:#8a5c00;}
.pill-b{background:var(--blue-pale);color:var(--blue);}

/* MODAL */
.m-overlay{position:fixed;inset:0;background:rgba(10,20,60,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px);}
.m-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:var(--r-lg);padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:92vh;overflow-y:auto;border-top:4px solid var(--blue-mid);}
.m-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.m-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g-light);}
.m-close:hover{color:var(--g-dark);}
.field{margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;color:var(--g-mid);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select{width:100%;padding:10px 12px;border-radius:8px;border:2px solid var(--g-border);font-family:'Barlow',sans-serif;font-size:13px;outline:none;color:var(--g-dark);}
.field input:focus,.field select:focus{border-color:var(--blue-mid);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.save-bar{display:flex;gap:10px;margin-top:20px;}
.btn-sv{flex:1;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--blue-mid),var(--blue-light));color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;}
.btn-cl{padding:12px 20px;border-radius:8px;border:2px solid var(--g-border);background:#fff;font-family:'Barlow',sans-serif;font-size:14px;cursor:pointer;color:var(--g-mid);}

/* CALENDAR */
.cal-wrap{margin-bottom:20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;}
.cal-nav{display:flex;gap:6px;}
.cal-nav-btn{padding:6px 14px;border-radius:8px;border:2px solid var(--g-border);background:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--g-mid);transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--blue-light);color:var(--blue);}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-day-name{text-align:center;font-size:11px;font-weight:700;color:var(--g-light);text-transform:uppercase;letter-spacing:.5px;padding:6px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{
  aspect-ratio:1;border-radius:8px;border:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;background:var(--g-ultra);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  position:relative;min-height:48px;
}
.cal-day:hover{border-color:var(--blue-light);background:var(--blue-ultra);}
.cal-day.empty{background:transparent;cursor:default;pointer-events:none;}
.cal-day.today{border-color:var(--blue-mid);background:var(--blue-pale);}
.cal-day.has-event{background:var(--blue-pale);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:15px;}
.cal-dot-wrap{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:32px;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.dot-training{background:var(--blue-mid);}
.dot-spiel{background:var(--gold);}
.dot-test{background:#7b68ee;}
.dot-hall{background:#20b2aa;}
.cal-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
.cal-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g-mid);font-weight:500;}
.cal-leg-dot{width:8px;height:8px;border-radius:50%;}

/* EVENT LIST (calendar right panel) */
.cal-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;}
.event-list-panel{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px;}
.ev-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.ev-item{padding:10px 12px;border-radius:8px;border-left:4px solid var(--g-border);margin-bottom:8px;background:var(--g-ultra);cursor:pointer;transition:all .15s;}
.ev-item:hover{background:var(--blue-ultra);}
.ev-item.t-training{border-left-color:var(--blue-mid);}
.ev-item.t-spiel{border-left-color:var(--gold);}
.ev-item.t-test{border-left-color:#7b68ee;}
.ev-item.t-hall{border-left-color:#20b2aa;}
.ev-item-date{font-size:11px;font-weight:700;color:var(--g-light);text-transform:uppercase;letter-spacing:.5px;}
.ev-item-type{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--g-dark);}
.ev-item-att{font-size:12px;color:var(--g-mid);}
.ev-add-btn{width:100%;padding:10px;border-radius:8px;border:2px dashed var(--g-border);background:transparent;font-family:'Barlow',sans-serif;font-size:13px;color:var(--g-light);cursor:pointer;transition:all .15s;font-weight:500;}
.ev-add-btn:hover{border-color:var(--blue-light);color:var(--blue);background:var(--blue-ultra);}

/* ATTENDANCE MODAL */
.att-fbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.att-fb{padding:5px 12px;border-radius:20px;border:2px solid var(--g-border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;color:var(--g-mid);transition:all .12s;}
.att-fb.active{background:var(--blue-pale);border-color:var(--blue-mid);color:var(--blue);}
.att-grid{display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto;padding:2px;}
.att-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--g-ultra);border-radius:8px;border:1px solid var(--g-border);}
.att-row:hover{background:var(--blue-ultra);}
.att-name{flex:1;font-size:13px;font-weight:600;}
.s-inputs{display:flex;gap:6px;}
.s-inp{width:46px;padding:5px;border-radius:6px;border:2px solid var(--g-border);font-size:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;outline:none;}
.s-inp:focus{border-color:var(--blue-mid);}
.s-lbl{font-size:9px;color:var(--g-light);text-align:center;font-weight:700;letter-spacing:.3px;}
.att-btns{display:flex;gap:4px;}
.att-b{padding:5px 10px;border-radius:6px;border:2px solid var(--g-border);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;background:#fff;color:var(--g-mid);letter-spacing:.2px;}
.att-b.anwesend{background:#e8f5eb;border-color:#2e8b46;color:#1a5c2a;}
.att-b.abwesend{background:var(--red-pale);border-color:var(--red);color:var(--red);}
.att-b.na{background:var(--g-bg);border-color:var(--g-border);color:var(--g-light);}

/* PHOTO */
.photo-up{border:2px dashed var(--g-border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px;}
.photo-up:hover{border-color:var(--blue-light);background:var(--blue-ultra);}
.p-prev{width:76px;height:76px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;border:3px solid var(--blue-pale);}

/* PLAYER DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:2px solid var(--g-border);background:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px;color:var(--g-mid);transition:all .15s;}
.back-btn:hover{border-color:var(--blue-light);color:var(--blue);}
.p-hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 100%);border-radius:var(--r-lg);padding:26px;margin-bottom:16px;display:flex;align-items:center;gap:18px;box-shadow:var(--sh-lg);color:#fff;}
.p-av-lg{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.5);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;object-fit:cover;}
.p-hero-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;}
.p-hero-sub{font-size:12px;opacity:.75;margin-top:3px;}
.pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.pcard{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.pcard .ptitle{font-size:10px;font-weight:700;color:var(--g-light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.pcard .pbig{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.pcard .psub{font-size:11px;color:var(--g-light);margin-top:3px;}

/* HEATMAP */
.hm-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px;}
.hm-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.hm-dots{display:flex;flex-wrap:wrap;gap:4px;}
.hm-dot{width:22px;height:22px;border-radius:5px;cursor:default;transition:transform .1s;}
.hm-dot:hover{transform:scale(1.3);}
.hm-leg{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
.hm-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g-mid);font-weight:500;}
.hm-ld{width:10px;height:10px;border-radius:2px;}

/* DASHBOARD */
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.d-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.d-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--blue-pale);}
.r-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g-border);}
.r-row:last-child{border-bottom:none;}
.r-med{font-size:18px;width:24px;text-align:center;}
.r-pos{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--g-light);width:20px;text-align:center;}
.r-name{flex:1;font-size:13px;font-weight:600;}
.r-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--blue);}

/* ELTERN */
.e-hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 60%,var(--blue-light) 100%);border-radius:var(--r-lg);padding:32px;margin-bottom:24px;color:#fff;box-shadow:var(--sh-lg);position:relative;overflow:hidden;}
.e-hero::after{content:'⚽';position:absolute;right:-10px;bottom:-20px;font-size:120px;opacity:.06;}
.e-hero h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.e-hero p{font-size:13px;opacity:.8;font-weight:500;}
.e-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.e-stat{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);text-align:center;border-bottom:3px solid var(--blue-mid);}
.e-stat .big{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:var(--blue);line-height:1;}
.e-stat .lbl{font-size:11px;color:var(--g-light);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.e-ranks{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.e-rank{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.e-rank-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.e-all{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.e-all-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--blue-pale);}

/* EMPTY */
.empty{background:#fff;border-radius:var(--r-lg);padding:48px 32px;text-align:center;box-shadow:var(--sh);}
.empty .ico{font-size:48px;margin-bottom:16px;}
.empty .etitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--blue);text-transform:uppercase;margin-bottom:8px;}
.empty .esub{font-size:14px;color:var(--g-mid);margin-bottom:24px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--g-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;animation:su .25s;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.success{background:linear-gradient(135deg,#1a5c2a,#2e8b46);}
.toast.error{background:linear-gradient(135deg,#8a1010,var(--red));}
@keyframes su{from{opacity:0;transform:translateY(12px);}}

@media(max-width:900px){.cal-layout{grid-template-columns:1fr;}}
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pcards{grid-template-columns:1fr;}
  .d-grid{grid-template-columns:1fr;}
  .e-stats,.e-ranks{grid-template-columns:1fr 1fr;}
  .content{padding:14px;}
  .row2{grid-template-columns:1fr;}
  .hdr-nav .nb:not(.active):not(:last-child):not([data-always]){display:none;}
}
</style>

// ── AUTH ──
async function checkSession(){const{data:{session}}=await sb.auth.getSession();if(session){currentUser=session.user;showApp();}}
async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pw=document.getElementById('lPw').value;
  const btn=document.getElementById('lBtn');
  document.getElementById('lErr').textContent='';
  btn.disabled=true;btn.textContent='Einloggen…';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Einloggen';
  if(error){document.getElementById('lErr').textContent='Falsche E-Mail oder Passwort';return;}
  currentUser=data.user;showApp();
}
async function logout(){
  await sb.auth.signOut();currentUser=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('trainerNav').style.display='none';
  document.getElementById('parentNav').style.display='none';
  document.getElementById('seasonBar').style.display='none';
  seasons=[];currentSeason=null;
}
function switchToLogin(){
  document.getElementById('appScreen').style.display='none';
  document.getElementById('parentNav').style.display='none';
  document.getElementById('seasonBar').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('trainerNav').style.display='flex';
  document.getElementById('trainerName').textContent=currentUser.email.split('@')[0];
  loadSeasons();
}

async function loadSeasons(){
  const{data,error}=await sb.from('seasons').select('*').order('saison');
  if(error){showToast('Ladefehler','error');return;}
  seasons=data||[];
  if(!seasons.length){showEmptyState();return;}
  currentSeason=seasons[seasons.length-1];
  buildDropdown();await loadSeasonData();
}
function buildDropdown(){
  const sel=document.getElementById('seasonSelect');
  sel.innerHTML=seasons.map(s=>`<option value="${s.id}"${s.id===currentSeason?.id?' selected':''}>${s.team} ${s.saison}</option>`).join('');
  document.getElementById('seasonBar').style.display='flex';
}
async function selectSeason(){
  const id=document.getElementById('seasonSelect').value;

}

    const eids=currentSeason._events.map(e=>e.id);
    const[attR,gR]=await Promise.all([
      sb.from('attendance').select('*').in('player_id',pids),
      sb.from('goals').select('*').in('event_id',eids).catch(()=>({data:[]}))
    ]);
    currentSeason._attendance=attR.data||[];
    currentSeason._goals=gR.data||[];
  }else{currentSeason._attendance=[];currentSeason._goals=[];}
  updateMeta();renderStats();renderTable();
  if(document.getElementById('view-eingabe').classList.contains('active'))renderEingabe();
  if(document.getElementById('view-auswertung').classList.contains('active'))renderAuswertung();
  if(document.getElementById('view-eltern').classList.contains('active'))renderEltern();
}

  const s=currentSeason;

  const sp=(s._events||[]).filter(e=>e.type!=='Training').length;
  document.getElementById('sMeta').textContent=`${tr} Trainings · ${sp} Spiele · ${(s._players||[]).length} Spieler`;
}

function thumb(p,sz=34){
  if(p.photo_url)return`<img class="p-thumb" style="width:${sz}px;height:${sz}px;" src="${p.photo_url}">`;
  const ini=(p.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return`<span class="p-init" style="width:${sz}px;height:${sz}px;font-size:${sz*0.35}px;">${ini}</span>`;
}
function bc(p){return p>=75?'bg':p>=50?'bm':'bl';}
function dotClass(t){return t==='Training'?'dot-training':t==='Spiel'||t==='Test - Spiel'?'dot-spiel':t==='Trainingsspiel'?'dot-test':'dot-hall';}
function evClass(t){return t==='Spiel'?'t-spiel':t==='Test - Spiel'||t==='Trainingsspiel'?'t-test':t==='Hallentunier'?'t-hall':'t-training';}

function renderCal(){
  const s=currentSeason;if(!s)return;
  const mnths=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('calTitle').textContent=`${mnths[calMonth]} ${calYear}`;
  const events=s._events||[];
  const att=s._attendance||[];
  // Build event map by date
  const evMap={};
  for(const e of events){
    if(!evMap[e.date])evMap[e.date]=[];
    evMap[e.date].push(e);
  }
  const today=new Date();today.setHours(0,0,0,0);
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  // Monday=0 offset
  let startDow=firstDay.getDay();if(startDow===0)startDow=7;startDow--;
  const grid=document.getElementById('calGrid');
  let html='';
  // Prev month padding
  for(let i=0;i<startDow;i++){
    const d=new Date(calYear,calMonth,-(startDow-1-i));
    html+=`<div class="cal-day empty other-month"><span class="cal-day-num" style="color:var(--g-light)">${d.getDate()}</span></div>`;
  }
  for(let d=1;d<=lastDay.getDate();d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs=evMap[dateStr]||[];
    const isToday=new Date(calYear,calMonth,d).getTime()===today.getTime();
    const hasEv=dayEvs.length>0;
    const dots=dayEvs.map(e=>`<div class="cal-dot ${dotClass(e.type)}"></div>`).join('');
    const attInfo=dayEvs.length>0?att.filter(a=>dayEvs.map(x=>x.id).includes(a.event_id)&&a.status==='anwesend').length:0;
    html+=`<div class="cal-day${isToday?' today':''}${hasEv?' has-event':''}" onclick="calDayClick('${dateStr}')" title="${dayEvs.map(e=>e.type).join(', ')||'Klicken zum Hinzufügen'}">
      <span class="cal-day-num">${d}</span>
      <div class="cal-dot-wrap">${dots}</div>
    </div>`;
  }
  grid.innerHTML=html;
}

function calDayClick(dateStr){
  const s=currentSeason;if(!s)return;
  const dayEvs=(s._events||[]).filter(e=>e.date===dateStr);
  if(dayEvs.length===0){
    // Pre-fill date and open add event modal
    showModal('addEvent',dateStr);
  } else if(dayEvs.length===1){
    showModal('attendance',dayEvs[0].id);
  } else {
    // Multiple events – show picker
    renderEvListForDate(dateStr);
  }
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();renderEvList();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();renderEvList();}
function calToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCal();renderEvList();}

  const att=s._attendance||[];const goals=s._goals||[];
  const pl=s._players||[];
  const trs=(s._events||[]).filter(e=>e.type==='Training');
  const sps=(s._events||[]).filter(e=>e.type!=='Training');
  const tIds=trs.map(e=>e.id);const sIds=sps.map(e=>e.id);
  const en=pl.map(p=>({...p,
    tC:att.filter(a=>a.player_id===p.id&&tIds.includes(a.event_id)&&a.status==='anwesend').length,
    sC:att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length,
    goals:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.goals||0),0),
    assists:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.assists||0),0),
  }));
  const tG=en.reduce((a,p)=>a+p.goals,0);
  const avg=trs.length&&pl.length?Math.round(en.reduce((a,p)=>a+p.tC,0)/pl.length/trs.length*100):0;
  const meds=['🥇','🥈','🥉'];
  const rR=(list,key,icon)=>list.map((p,i)=>`<div class="r-row"><div class="r-med">${meds[i]||''}</div>${thumb(p,28)}<div class="r-name">${p.name}</div><div class="r-val" style="color:var(--blue)">${p[key]} ${icon}</div></div>`).join('');
  const topG=[...en].sort((a,b)=>b.goals-a.goals).filter(p=>p.goals>0).slice(0,5);
  const topT=[...en].sort((a,b)=>b.tC-a.tC).slice(0,5);
  const topA=[...en].sort((a,b)=>b.assists-a.assists).filter(p=>p.assists>0).slice(0,5);
  document.getElementById('elternContent').innerHTML=`
    <div class="e-hero"><h2>⚽ ${s.team} – Saison ${s.saison}</h2><p>SG Achslach-Gotteszell · ${pl.length} Spieler · ${trs.length} Trainings · ${sps.length} Spiele</p></div>
    <div class="e-stats">
      <div class="e-stat"><div class="big">${avg}%</div><div class="lbl">Ø Anwesenheit</div></div>
      <div class="e-stat"><div class="big" style="color:#1a5c2a;">${tG}</div><div class="lbl">Tore gesamt ⚽</div></div>
      <div class="e-stat"><div class="big">${sps.length}</div><div class="lbl">Spiele</div></div>
    </div>
    <div class="e-ranks">
      <div class="e-rank"><div class="e-rank-title">⚽ Torschützen</div>${topG.length?rR(topG,'goals','⚽'):'<div style="font-size:13px;color:var(--g-light);padding:8px 0;">Noch keine Tore</div>'}</div>
      <div class="e-rank"><div class="e-rank-title">🏃 Fleiß-Ranking</div>${rR(topT,'tC','×')}</div>
      <div class="e-rank"><div class="e-rank-title">🅰️ Vorlagen</div>${topA.length?rR(topA,'assists','🅰️'):'<div style="font-size:13px;color:var(--g-light);padding:8px 0;">Noch keine Assists</div>'}</div>
    </div>
    <div class="e-all"><div class="e-all-title">Alle Spieler</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="background:var(--blue);color:#fff;">${['Spieler','Training','Spiele','Tore','Assists'].map(h=>`<th style="padding:9px 14px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;text-align:left;">${h}</th>`).join('')}</tr></thead><tbody>
      ${[...en].sort((a,b)=>b.tC-a.tC).map(p=>{const tp=trs.length?Math.round(p.tC/trs.length*100):0;return`<tr style="border-bottom:1px solid var(--g-border);" onmouseover="this.style.background='var(--blue-ultra)'" onmouseout="this.style.background=''"><td style="padding:9px 14px;"><div style="display:flex;align-items:center;gap:8px;">${thumb(p,30)}<span style="font-weight:600;">${p.name}</span></div></td><td style="padding:9px 14px;"><div class="pct-bar"><div class="bt"><div class="bf ${bc(tp)}" style="width:${tp}%"></div></div><span class="pv">${p.tC}/${trs.length}</span></div></td><td style="padding:9px 14px;">${p.sC}/${sps.length}</td><td style="padding:9px 14px;">${p.goals>0?`<span class="pill pill-g">${p.goals} ⚽</span>`:'–'}</td><td style="padding:9px 14px;">${p.assists>0?`<span class="pill pill-b">${p.assists} 🅰️</span>`:'–'}</td></tr>`;}).join('')}
      </tbody></table></div>`;
}

function closeModal(){document.getElementById('mOverlay').classList.add('hidden');}
document.getElementById('mOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function filtAtt(f){
  document.querySelectorAll('.att-fb').forEach(b=>b.classList.remove('active'));
  document.getElementById('af-'+f).classList.add('active');
  document.querySelectorAll('#attGrid .att-row').forEach(r=>{
    const s=r.getAttribute('data-status')||'na';
    r.style.display=(f==='all'||s===f)?'':'none';
  });
}
function setAtt(pid,eid,st){
  if(!pendingAtt[eid])pendingAtt[eid]={};
  pendingAtt[eid][pid]=st;
  const row=document.getElementById(`arow-${pid}`);if(!row)return;
  row.setAttribute('data-status',st);
  row.querySelectorAll('.att-b').forEach(b=>{
    b.classList.remove('anwesend','abwesend','na');
    const bs=b.textContent.trim()==='✓'?'anwesend':b.textContent.trim()==='✗'?'abwesend':'na';
    if(bs===st)b.classList.add(st);
  });
}
async function saveAtt(eid,isSp){
  const pls=currentSeason._players;
  const allAtt=pls.map(p=>{
    const row=document.getElementById(`arow-${p.id}`);
    const st=(pendingAtt[eid]&&pendingAtt[eid][p.id])||row?.getAttribute('data-status')||'na';
    return{player_id:p.id,event_id:eid,status:st};
  });
  const{error:e1}=await sb.from('attendance').upsert(allAtt,{onConflict:'player_id,event_id'});
  if(e1){showToast('Fehler: '+e1.message,'error');return;}
  if(isSp){
    const gu=pls.map(p=>({player_id:p.id,event_id:eid,goals:parseInt(document.getElementById(`goal-${p.id}`)?.value)||0,assists:parseInt(document.getElementById(`asst-${p.id}`)?.value)||0}));
    const{error:e2}=await sb.from('goals').upsert(gu,{onConflict:'player_id,event_id'});
    if(e2){showToast('Fehler Tore: '+e2.message,'error');return;}
  }
  delete pendingAtt[eid];
  showToast('Gespeichert ✓','success');
  closeModal();await loadSeasonData();
}

function prevPhoto(s){
  const file=document.getElementById(`pF${s}`).files[0];if(!file)return;
  const img=new Image();const reader=new FileReader();
  reader.onload=e=>{img.src=e.target.result;};
  img.onload=()=>{
    const c=document.createElement('canvas');const max=200;
    let w=img.width,h=img.height;
    if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    photoDataUrl=c.toDataURL('image/jpeg',.8);
    const pr=document.getElementById(`pPr${s}`);
    pr.src=photoDataUrl;pr.style.display='block';
    document.getElementById(`pH${s}`).textContent='Foto ändern';
  };
  reader.readAsDataURL(file);
}
async function saveSeason(){
  const team=document.getElementById('mTeam').value;const saison=document.getElementById('mSaison').value.trim();if(!saison)return;
  const{data,error}=await sb.from('seasons').insert({team,saison}).select().single();
  if(error){showToast('Fehler: '+error.message,'error');return;}
  seasons.push({...data,_players:[],_events:[],_attendance:[],_goals:[]});
  currentSeason=seasons[seasons.length-1];buildDropdown();
  closeModal();renderStats();renderTable();renderEingabe();
  showToast('Saison angelegt ✓','success');
}
async function savePlayer(editId){
  const name=document.getElementById('mPN').value.trim();if(!name)return;
  const upd={name};if(photoDataUrl)upd.photo_url=photoDataUrl;
  if(editId){
    const{error}=await sb.from('players').update(upd).eq('id',editId);
    if(error){showToast('Fehler','error');return;}
    const p=currentSeason._players.find(p=>p.id===editId);if(p){p.name=name;if(photoDataUrl)p.photo_url=photoDataUrl;}
  }else{
    const{data,error}=await sb.from('players').insert({...upd,season_id:currentSeason.id}).select().single();
    if(error){showToast('Fehler','error');return;}
    currentSeason._players.push(data);
  }
  photoDataUrl=null;closeModal();closePlayer();renderTable();renderEingabe();
  showToast('Spieler gespeichert ✓','success');
}
async function saveEvent(){
  const type=document.getElementById('mET').value;const date=document.getElementById('mED').value;if(!date)return;
  const{data,error}=await sb.from('events').insert({type,date,season_id:currentSeason.id}).select().single();
  if(error){showToast('Fehler','error');return;}
  currentSeason._events.push(data);closeModal();
  renderStats();renderTable();renderEingabe();
  showToast('Angelegt ✓','success');
  setTimeout(()=>showModal('attendance',data.id),400);
}

// ── NAV ──
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('#trainerNav .nb').forEach(b=>b.classList.remove('active'));
  const idx={saison:0,eingabe:1,auswertung:2,eltern:3};
  document.querySelectorAll('#trainerNav .nb')[idx[v]]?.classList.add('active');
  if(v==='eingabe'){calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderEingabe();}
  if(v==='auswertung')renderAuswertung();
  if(v==='eltern')renderEltern();
}

let toastTimer;
function showToast(msg,type='success'){
  const el=document.getElementById('toastEl');el.textContent=msg;el.className='toast '+type;el.style.display='block';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',3500);
}
