<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SG Achslach-Gotteszell</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#2D6A4F;--green-l:#52B788;--green-pale:#D8F3DC;
  --amber:#E07A00;--amber-pale:#FFF3CD;
  --red:#C62828;--red-pale:#FFEBEE;
  --blue:#185FA5;--blue-pale:#E6F1FB;
  --g0:#F8F9FA;--g1:#F1F3F5;--g2:#E9ECEF;--g3:#DEE2E6;
  --g5:#ADB5BD;--g7:#495057;--g9:#212529;
  --sh:0 1px 4px rgba(0,0,0,.08);--sh2:0 4px 20px rgba(0,0,0,.13);--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--g1);color:var(--g9);min-height:100vh;}

.header{background:var(--green);color:white;padding:0 16px;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header-logo{width:40px;height:40px;border-radius:50%;object-fit:cover;background:white;flex-shrink:0;border:2px solid rgba(255,255,255,.4);}
.header-title{font-size:14px;font-weight:600;line-height:1.2;}
.header-sub{font-size:10px;opacity:.7;}
.header-nav{margin-left:auto;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.nav-btn{padding:5px 10px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:white;font-size:12px;font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.3);}
.trainer-info{font-size:11px;opacity:.65;margin-left:2px;}

.season-bar{background:white;border-bottom:1px solid var(--g2);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.season-select{padding:7px 12px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:13px;font-weight:500;background:white;color:var(--g9);cursor:pointer;outline:none;min-width:180px;}
.season-select:focus{border-color:var(--green);}
.season-meta{font-size:12px;color:var(--g5);}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:20px;}
.login-card{background:white;border-radius:16px;padding:36px;box-shadow:var(--sh2);width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:12px;}
.login-logo img{width:80px;height:80px;object-fit:contain;}
.login-title{text-align:center;font-size:20px;font-weight:600;margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:var(--g5);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:500;color:var(--g7);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--green);}
.btn-primary{width:100%;padding:11px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.err-msg{color:var(--red);font-size:12px;margin-top:8px;text-align:center;}
.parent-link{text-align:center;margin-top:16px;}
.parent-link button{background:none;border:none;font-size:13px;color:var(--g5);cursor:pointer;font-family:inherit;text-decoration:underline;}

.content{padding:20px;max-width:1100px;margin:0 auto;}
.view{display:none;}.view.active{display:block;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:white;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.stat-value{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-sub{font-size:11px;color:var(--g5);margin-top:2px;}

.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-input{flex:1;min-width:150px;padding:8px 12px;border-radius:8px;border:1px solid var(--g2);font-family:inherit;font-size:13px;outline:none;}
.search-input:focus{border-color:var(--green);}
.filt-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:12px;cursor:pointer;color:var(--g7);white-space:nowrap;}
.filt-btn.active{background:var(--green-pale);border-color:var(--green);color:var(--green);font-weight:500;}
.add-btn{padding:7px 14px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.add-btn.amber{background:var(--amber);}.add-btn.gray{background:var(--g7);}

.table-wrap{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--g0);border-bottom:1px solid var(--g2);}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;}
tbody tr{border-bottom:1px solid var(--g1);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--g0);}
td{padding:9px 12px;vertical-align:middle;}
.pname{font-weight:500;}
.player-thumb{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--green-pale);border:2px solid var(--g2);flex-shrink:0;}
.player-thumb-placeholder{width:32px;height:32px;border-radius:50%;background:var(--green-pale);color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;border:2px solid var(--g2);}
.pct-bar{display:flex;align-items:center;gap:6px;}
.bar-track{flex:1;height:5px;background:var(--g2);border-radius:3px;overflow:hidden;max-width:70px;}
.bar-fill{height:100%;border-radius:3px;}
.bg{background:var(--green-l);}.ba{background:var(--amber);}.br{background:var(--red);}
.pct-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--g7);min-width:34px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal{background:white;border-radius:14px;padding:28px;width:100%;max-width:560px;box-shadow:var(--sh2);max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g5);line-height:1;}
.modal-close:hover{color:var(--g9);}
.field{margin-bottom:16px;}
.field label{font-size:12px;font-weight:500;color:var(--g7);margin-bottom:5px;display:block;}
.field input,.field select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:13px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--green);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.save-bar{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;padding:11px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.btn-cancel{padding:11px 20px;border-radius:8px;border:1px solid var(--g3);background:white;font-family:inherit;font-size:14px;cursor:pointer;color:var(--g7);}

/* Attendance modal */
.att-filter-bar{display:flex;gap:8px;margin-bottom:12px;}
.att-filt{padding:5px 12px;border-radius:20px;border:1px solid var(--g2);background:white;font-size:12px;cursor:pointer;font-family:inherit;color:var(--g7);}
.att-filt.active{background:var(--green-pale);border-color:var(--green);color:var(--green);font-weight:500;}
.att-grid{display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto;padding:2px;}
.att-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--g0);border-radius:8px;}
.att-name{flex:1;font-size:13px;font-weight:500;}
.stat-inputs{display:flex;gap:6px;align-items:center;}
.stat-inp{width:44px;padding:4px 6px;border-radius:6px;border:1px solid var(--g3);font-size:12px;text-align:center;font-family:'DM Mono',monospace;}
.stat-lbl{font-size:9px;color:var(--g5);text-align:center;margin-top:1px;}
.att-btns{display:flex;gap:4px;}
.att-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--g3);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:white;color:var(--g7);transition:all .1s;white-space:nowrap;}
.att-btn.anwesend{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.att-btn.abwesend{background:var(--red-pale);border-color:#FFCDD2;color:var(--red);}
.att-btn.na{background:var(--g2);border-color:var(--g3);color:var(--g5);}

/* Photo upload */
.photo-upload-area{border:2px dashed var(--g3);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:12px;}
.photo-upload-area:hover{border-color:var(--green);}
.photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;}

/* Player detail */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:13px;cursor:pointer;margin-bottom:18px;color:var(--g7);}
.back-btn:hover{background:var(--g0);}
.player-header{background:white;border-radius:var(--r);padding:22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh);}
.player-avatar-lg{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;border:3px solid var(--g2);}
.season-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.sc{background:white;border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.sc-title{font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
.big-num{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.dash-card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.dash-title{font-size:13px;font-weight:600;color:var(--g7);margin-bottom:14px;}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g1);}
.rank-item:last-child{border-bottom:none;}
.rn{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--g5);width:18px;}
.rname{flex:1;font-size:13px;font-weight:500;}
.rval{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;color:var(--green);}

/* Eltern */
.parent-hero{background:linear-gradient(135deg,var(--green) 0%,#1a4a37 100%);color:white;border-radius:var(--r);padding:28px;margin-bottom:20px;box-shadow:var(--sh2);}
.parent-hero h2{font-size:22px;font-weight:600;margin-bottom:4px;}
.parent-hero p{font-size:13px;opacity:.8;}
.parent-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.parent-stat{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);text-align:center;}
.parent-stat .big{font-size:32px;font-weight:600;font-family:'DM Mono',monospace;}
.parent-stat .lbl{font-size:12px;color:var(--g5);margin-top:4px;}
.top-list{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px;}
.top-list-title{font-size:14px;font-weight:600;margin-bottom:14px;}

.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--g9);color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;animation:fadeIn .2s;box-shadow:var(--sh2);}
.toast.success{background:var(--green);}.toast.error{background:var(--red);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}}

@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .season-cards{grid-template-columns:1fr;}
  .dash-grid{grid-template-columns:1fr;}
  .parent-stats{grid-template-columns:1fr 1fr;}
  .content{padding:12px;}
  .row2{grid-template-columns:1fr;}
  .header-nav .nav-btn:not(.active):not(:last-child){display:none;}
}
</style>
</head>

<div class="content">
  <div class="view active" id="view-saison">

        <input class="search-input" type="text" placeholder="Spieler suchen…" oninput="renderPlayerTable()">

  <div class="view" id="view-auswertung"><div id="auswertungContent"></div></div>

</div>
</div>

  <div class="modal" id="modalBox"></div>
</div>
<div id="toastEl" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://niorgrizesaoeclvdtiy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pb3Jncml6ZXNhb2VjbHZkdGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjIwODEsImV4cCI6MjA4OTM5ODA4MX0.qi4mcW9SWt52daMhMXUkg4XNP3wU40yYJrrKcFbIZuw';

let sb,currentUser,seasons=[],currentSeason=null,filt='all';
const pendingAtt={};

document.addEventListener('DOMContentLoaded',()=>{
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  checkSession();
});

async function checkSession(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;showApp();}
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginErr');
  err.textContent='';
  btn.disabled=true;btn.textContent='Einloggen…';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Einloggen';
  if(error){err.textContent='Falsche E-Mail oder Passwort';return;}
  currentUser=data.user;
  showApp();
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('trainerNav').style.display='none';
  document.getElementById('parentNav').style.display='none';
  document.getElementById('seasonBar').style.display='none';
  seasons=[];currentSeason=null;
}

function switchToLogin(){
  document.getElementById('appScreen').style.display='none';
  document.getElementById('parentNav').style.display='none';
  document.getElementById('seasonBar').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('trainerNav').style.display='flex';
  document.getElementById('trainerName').textContent=currentUser.email.split('@')[0];
  loadSeasons();
}

// ── SEASONS ──
async function loadSeasons(){
  const {data,error}=await sb.from('seasons').select('*').order('saison');
  if(error){showToast('Ladefehler','error');return;}
  seasons=data||[];
  if(seasons.length===0){showEmptyState();return;}
  currentSeason=seasons[seasons.length-1];
  buildSeasonDropdown();
  await loadSeasonData();
}

function buildSeasonDropdown(){
  const sel=document.getElementById('seasonSelect');
  sel.innerHTML=seasons.map(s=>`<option value="${s.id}"${s.id===currentSeason?.id?' selected':''}>${s.team} ${s.saison}</option>`).join('');
  document.getElementById('seasonBar').style.display='flex';
}

async function selectSeasonByDropdown(){
  const id=document.getElementById('seasonSelect').value;
  currentSeason=seasons.find(s=>s.id===id);
  await loadSeasonData();
}

async function loadSeasonData(){
  if(!currentSeason)return;
  document.getElementById('playerTableArea').innerHTML='<div style="padding:40px;text-align:center;color:var(--g5);">Lade…</div>';
  const [plRes,evRes]=await Promise.all([
    sb.from('players').select('*').eq('season_id',currentSeason.id).order('name'),
    sb.from('events').select('*').eq('season_id',currentSeason.id).order('date')
  ]);
  currentSeason._players=plRes.data||[];
  currentSeason._events=evRes.data||[];
  if(currentSeason._players.length>0&&currentSeason._events.length>0){
    const pids=currentSeason._players.map(p=>p.id);
    const eids=currentSeason._events.map(e=>e.id);
    const [attRes,goalsRes]=await Promise.all([
      sb.from('attendance').select('*').in('player_id',pids),
      sb.from('goals').select('*').in('event_id',eids)
    ]);
    currentSeason._attendance=attRes.data||[];
    currentSeason._goals=goalsRes.data||[];
  } else {
    currentSeason._attendance=[];
    currentSeason._goals=[];
  }
  updateSeasonMeta();
  renderStats();
  renderPlayerTable();
  if(document.getElementById('view-eingabe').classList.contains('active'))renderEingabe();
  if(document.getElementById('view-auswertung').classList.contains('active'))renderAuswertung();
  if(document.getElementById('view-eltern').classList.contains('active'))renderEltern();
}

function updateSeasonMeta(){
  const s=currentSeason;
  const tr=(s._events||[]).filter(e=>e.type==='Training').length;
  const sp=(s._events||[]).filter(e=>e.type!=='Training').length;
  document.getElementById('seasonMeta').textContent=`${tr} Trainings · ${sp} Spiele · ${(s._players||[]).length} Spieler`;
}

function showEmptyState(){
  document.getElementById('seasonBar').style.display='none';
  document.getElementById('statsGrid').innerHTML='';
  document.getElementById('playerTableArea').innerHTML=`
    <div style="background:white;border-radius:12px;padding:32px;text-align:center;box-shadow:var(--sh);">
      <div style="font-size:32px;margin-bottom:12px;">📁</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Noch keine Daten</div>
      <div style="font-size:13px;color:var(--g5);margin-bottom:20px;">Lege eine neue Saison an oder importiere die historischen Daten.</div>
      <button onclick="showModal(\'newSeason\')" class="add-btn" style="margin-right:8px;padding:10px 20px;font-size:13px;">+ Neue Saison</button>
      <button onclick="showModal(\'import\')" class="add-btn gray" style="padding:10px 20px;font-size:13px;">📥 Historische Daten</button>
    </div>`;
}

// ── STATS ──
function renderStats(){
  const s=currentSeason;
  const tr=(s._events||[]).filter(e=>e.type==='Training').length;
  const sp=(s._events||[]).filter(e=>e.type!=='Training').length;
  const pl=s._players||[];
  const att=s._attendance||[];
  const tIds=(s._events||[]).filter(e=>e.type==='Training').map(e=>e.id);
  const avg=tr>0&&pl.length>0?Math.round(pl.reduce((a,p)=>a+att.filter(x=>x.player_id===p.id&&tIds.includes(x.event_id)&&x.status==='anwesend').length,0)/pl.length/tr*100):0;
  const goals=(s._goals||[]).reduce((a,g)=>a+(g.goals||0),0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Spieler</div><div class="stat-value">${pl.length}</div><div class="stat-sub">${s.team} ${s.saison}</div></div>
    <div class="stat-card"><div class="stat-label">Trainings</div><div class="stat-value">${tr}</div><div class="stat-sub">Einheiten</div></div>
    <div class="stat-card"><div class="stat-label">Spiele</div><div class="stat-value">${sp}</div><div class="stat-sub">inkl. Testspiele</div></div>
    <div class="stat-card"><div class="stat-label">Ø Anwesenheit</div><div class="stat-value">${avg||'–'}${avg?'%':''}</div><div class="stat-sub">Training · ${goals} Tore</div></div>`;
}

function setFilt(f){
  filt=f;
  ['fa','ft','fs'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(f==='all'?'fa':f==='training'?'ft':'fs').classList.add('active');
  renderPlayerTable();

function getThumb(p){
  if(p.photo_url) return `<img class="player-thumb" src="${p.photo_url}" alt="">`;
  const ini=(p.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return `<span class="player-thumb-placeholder">${ini}</span>`;
}

function renderPlayerTable(){
  const s=currentSeason;if(!s)return;
  const q=document.querySelector('#view-saison .search-input')?.value?.toLowerCase()||'';
  const players=(s._players||[]).filter(p=>p.name.toLowerCase().includes(q));
  const att=s._attendance||[];
  const goals=s._goals||[];
  const trainings=(s._events||[]).filter(e=>e.type==='Training');
  const spiele=(s._events||[]).filter(e=>e.type!=='Training');
  const tIds=trainings.map(e=>e.id);
  const sIds=spiele.map(e=>e.id);

  const enriched=players.map(p=>({
    ...p,
    tCount:att.filter(a=>a.player_id===p.id&&tIds.includes(a.event_id)&&a.status==='anwesend').length,
    sCount:att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length,
    goals:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.goals||0),0),
    assists:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.assists||0),0),
  })).sort((a,b)=>b.tCount-a.tCount);

  const showT=filt!=='spiel';
  const showS=filt!=='training';

  let html=`<div class="table-wrap"><table><thead><tr>
    <th colspan="2">Name</th>
    ${showT?'<th>Training</th><th>Quote</th>':''}
    ${showS?'<th>Spiele</th><th>Tore</th><th>Assists</th>':''}
    <th></th>
  </tr></thead><tbody>`;

  for(const p of enriched){
    const tp=trainings.length>0?Math.round(p.tCount/trainings.length*100):0;
    const tc=tp>=75?'bg':tp>=50?'ba':'br';
    html+=`<tr onclick="openPlayer('${p.id}')">
      <td style="width:44px;padding-right:0;">${getThumb(p)}</td>
      <td class="pname">${p.name}</td>
      ${showT?`<td><b>${p.tCount}</b><span style="color:var(--g5)"> /${trainings.length}</span></td>
        <td><div class="pct-bar"><div class="bar-track"><div class="bar-fill ${tc}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div></td>`:''}
      ${showS?`<td><b>${p.sCount}</b><span style="color:var(--g5)"> /${spiele.length}</span></td>
        <td><b>${p.goals}</b> ⚽</td>
        <td><b>${p.assists}</b> 🅰️</td>`:''}
      <td style="text-align:right;color:var(--g5);">›</td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
    <button onclick="showModal(\'addPlayer\')" class="add-btn">+ Spieler</button>
    <button onclick="showModal(\'addEvent\')" class="add-btn amber">+ Training / Spiel</button>
    <button onclick="showModal(\'newSeason\')" class="add-btn gray">+ Neue Saison</button>
  </div>`;
  document.getElementById('playerTableArea').innerHTML=html;
}

    </div>
    <div class="season-cards">
      <div class="sc"><div class="sc-title">Training</div>
        <div class="big-num" style="color:var(--green)">${tCount}<span style="font-size:16px;color:var(--g5)"> /${trainings.length}</span></div>
        <div class="pct-bar" style="margin-top:8px;"><div class="bar-track" style="max-width:100px;"><div class="bar-fill ${tp>=75?'bg':tp>=50?'ba':'br'}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div>
      </div>
      <div class="sc"><div class="sc-title">Spieleinsätze</div>
        <div class="big-num" style="color:var(--amber)">${sCount}<span style="font-size:16px;color:var(--g5)"> /${spiele.length}</span></div>
        <div class="pct-bar" style="margin-top:8px;"><div class="bar-track" style="max-width:100px;"><div class="bar-fill ${sp>=75?'bg':sp>=50?'ba':'br'}" style="width:${sp}%"></div></div><span class="pct-val">${sp}%</span></div>
      </div>
      <div class="sc"><div class="sc-title">Tore & Assists</div>
        <div style="display:flex;gap:20px;">
          <div><div class="big-num" style="color:var(--green)">${totalGoals}</div><div style="font-size:11px;color:var(--g5);">Tore ⚽</div></div>

    <button onclick="showModal(\'addEvent\')" class="add-btn" style="font-size:13px;padding:10px 18px;">+ Training / Spiel</button>
    <button onclick="showModal(\'addPlayer\')" class="add-btn" style="font-size:13px;padding:10px 18px;background:var(--blue);">+ Spieler</button>

  </div>
  <div class="table-wrap"><table><thead><tr>
    <th>Datum</th><th>Typ</th><th>Anwesend</th><th>Tore / Assists</th><th></th>
  </tr></thead><tbody>`;
  if(!events.length)html+=`<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--g5);">Noch keine Einträge.</td></tr>`;
  for(const e of events){
    const attCnt=(s._attendance||[]).filter(a=>a.event_id===e.id&&a.status==='anwesend').length;
    const gc=(s._goals||[]).filter(g=>g.event_id===e.id).reduce((a,g)=>a+(g.goals||0),0);
    const ac=(s._goals||[]).filter(g=>g.event_id===e.id).reduce((a,g)=>a+(g.assists||0),0);
    const date=new Date(e.date).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
    const isS=e.type!=='Training';
    html+=`<tr>
      <td><b>${date}</b></td>
      <td><span style="font-weight:500;color:${isS?'var(--amber)':'var(--green)'}">${e.type}</span></td>
      <td>${attCnt>0?`<span style="color:var(--green);font-weight:500;">${attCnt} anwesend</span>`:'<span style="color:var(--g5);">Nicht erfasst</span>'}</td>
      <td>${isS?(gc||ac?`${gc} ⚽ · ${ac} 🅰️`:'<span style="color:var(--g5);">–</span>'):'<span style="color:var(--g5);">–</span>'}</td>
      <td><button onclick="showModal(\'attendance\',\'${e.id}\')" style="padding:5px 12px;border-radius:6px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:12px;cursor:pointer;">${attCnt>0?'Bearbeiten':'Erfassen'}</button></td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  document.getElementById('eingabeContent').innerHTML=html;
}

// ── AUSWERTUNG ──
function renderAuswertung(){
  const s=currentSeason;if(!s)return;
  const att=s._attendance||[];const goals=s._goals||[];
  const trainings=(s._events||[]).filter(e=>e.type==='Training');
  const spiele=(s._events||[]).filter(e=>e.type!=='Training');
  const tIds=trainings.map(e=>e.id);const sIds=spiele.map(e=>e.id);
  const enriched=(s._players||[]).map(p=>({
    name:p.name,
    tCount:att.filter(a=>a.player_id===p.id&&tIds.includes(a.event_id)&&a.status==='anwesend').length,
    sCount:att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length,
    goals:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.goals||0),0),
    assists:goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.assists||0),0),
  }));
  const rank=(list,key,icon)=>list.map((p,i)=>`<div class="rank-item"><span class="rn">${i+1}.</span><span class="rname">${p.name}</span><span class="rval">${p[key]} ${icon}</span></div>`).join('');
  const topT=[...enriched].sort((a,b)=>b.tCount-a.tCount).slice(0,8);
  const topS=[...enriched].sort((a,b)=>b.sCount-a.sCount).slice(0,8);
  const topG=[...enriched].sort((a,b)=>b.goals-a.goals).slice(0,8);
  const topA=[...enriched].sort((a,b)=>b.assists-a.assists).slice(0,8);
  const allRows=seasons.map(s=>{
    const tr2=(s._events||[]).filter(e=>e.type==='Training').length;
    const sp2=(s._events||[]).filter(e=>e.type!=='Training').length;
    const pl2=s._players||[];const att2=s._attendance||[];
    const tIds2=(s._events||[]).filter(e=>e.type==='Training').map(e=>e.id);
    const avg2=tr2>0&&pl2.length>0?Math.round(pl2.reduce((a,p)=>a+att2.filter(x=>x.player_id===p.id&&tIds2.includes(x.event_id)&&x.status==='anwesend').length,0)/pl2.length/tr2*100):null;
    const g2=(s._goals||[]).reduce((a,g)=>a+(g.goals||0),0);
    return `<tr style="border-bottom:1px solid var(--g1);">
      <td style="padding:9px 12px;font-weight:500;">${s.team} ${s.saison}</td>
      <td style="padding:9px 12px;">${pl2.length}</td><td style="padding:9px 12px;">${tr2}</td>
      <td style="padding:9px 12px;">${sp2}</td><td style="padding:9px 12px;">${g2}</td>
      <td style="padding:9px 12px;">${avg2!=null?`<div class="pct-bar"><div class="bar-track"><div class="bar-fill ${avg2>=75?'bg':avg2>=50?'ba':'br'}" style="width:${avg2}%"></div></div><span class="pct-val">${avg2}%</span></div>`:'–'}</td>
    </tr>`;
  }).join('');
  document.getElementById('auswertungContent').innerHTML=`
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-title">🏃 Top Training</div>${rank(topT,'tCount','')}</div>
      <div class="dash-card"><div class="dash-title">🏅 Top Spieleinsätze</div>${rank(topS,'sCount','')}</div>
      <div class="dash-card"><div class="dash-title">⚽ Torschützen</div>${rank(topG,'goals','⚽')}</div>
      <div class="dash-card"><div class="dash-title">🅰️ Vorlagen</div>${rank(topA,'assists','🅰️')}</div>
      <div class="dash-card" style="grid-column:span 2;">
        <div class="dash-title">Alle Saisons</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr>
          ${['Saison','Spieler','Trainings','Spiele','Tore','Ø Anwesenheit'].map(h=>`<th style="text-align:left;padding:8px 12px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">${h}</th>`).join('')}
        </tr></thead><tbody>${allRows}</tbody></table>
      </div>
    </div>`;
}

function showParentView(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('trainerNav').style.display='none';
  document.getElementById('parentNav').style.display='flex';
  if(seasons.length===0){
    loadSeasonsPublic();
  } else {
    document.getElementById('seasonBar').style.display='flex';
    showView('eltern');
    renderEltern();
  }
}

async function loadSeasonsPublic(){
  const {data}=await sb.from('seasons').select('*').order('saison');
  seasons=data||[];
  if(seasons.length>0){
    currentSeason=seasons[seasons.length-1];
    buildSeasonDropdown();
    await loadSeasonData();
  }
  showView('eltern');
  renderEltern();
}

      </div>

function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── ATTENDANCE FILTER IN MODAL ──
function filterAttRows(f){
  document.querySelectorAll('.att-filt').forEach(b=>b.classList.remove('active'));
  document.getElementById('af-'+f).classList.add('active');
  document.querySelectorAll('#attGrid .att-row').forEach(row=>{
    const s=row.getAttribute('data-status')||'na';
    row.style.display=(f==='all'||s===f)?'':'none';
  });
}

// ── ATTENDANCE STATE ──
function setAtt(pid,eid,status){
  if(!pendingAtt[eid])pendingAtt[eid]={};
  pendingAtt[eid][pid]=status;
  const row=document.getElementById(`arow-${pid}`);
  if(!row)return;
  row.setAttribute('data-status',status);
  row.querySelectorAll('.att-btn').forEach(b=>{
    b.classList.remove('anwesend','abwesend','na');
    const bs=b.textContent.trim()==='✓'?'anwesend':b.textContent.trim()==='✗'?'abwesend':'na';
    if(bs===status)b.classList.add(status);
  });
}

async function saveAllAttendance(eid,isSpiel){
  const players=currentSeason._players;
  const allAtt=players.map(p=>{
    const row=document.getElementById(`arow-${p.id}`);
    const status=(pendingAtt[eid]&&pendingAtt[eid][p.id])||row?.getAttribute('data-status')||null;
    if(!status||status==='na')return null;
    return {player_id:p.id,event_id:eid,status};
  }).filter(Boolean);

  // also save 'na' explicitly for completeness
  const naAtt=players.map(p=>{
    const row=document.getElementById(`arow-${p.id}`);
    const status=(pendingAtt[eid]&&pendingAtt[eid][p.id])||row?.getAttribute('data-status')||null;
    if(status!=='na')return null;
    return {player_id:p.id,event_id:eid,status:'na'};
  }).filter(Boolean);

  const toUpsert=[...allAtt,...naAtt];
  if(toUpsert.length>0){
    const {error}=await sb.from('attendance').upsert(toUpsert,{onConflict:'player_id,event_id'});
    if(error){showToast('Fehler Anwesenheit: '+error.message,'error');return;}
  }

  if(isSpiel){
    const goalsUpsert=players.map(p=>{
      const gEl=document.getElementById(`goal-${p.id}`);
      const aEl=document.getElementById(`asst-${p.id}`);
      if(!gEl&&!aEl)return null;
      const g=parseInt(gEl?.value)||0;
      const a=parseInt(aEl?.value)||0;
      return {player_id:p.id,event_id:eid,goals:g,assists:a};
    }).filter(Boolean);
    if(goalsUpsert.length>0){
      const {error}=await sb.from('goals').upsert(goalsUpsert,{onConflict:'player_id,event_id'});
      if(error){showToast('Fehler Tore: '+error.message,'error');return;}
    }
  }

  delete pendingAtt[eid];
  showToast('Gespeichert ✓','success');
  closeModal();
  await loadSeasonData();
}

// ── PHOTO UPLOAD ──
let photoDataUrl=null;
function previewPhoto(suffix){
  const file=document.getElementById(`photoFile${suffix}`).files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    photoDataUrl=e.target.result;
    const prev=document.getElementById(`photoPreview${suffix}`);
    prev.src=photoDataUrl;prev.style.display='block';
    document.getElementById(`photoHint${suffix}`).textContent='Foto ändern';
  };
  reader.readAsDataURL(file);
}

// ── SAVE HELPERS ──
async function saveSeason(){
  const team=document.getElementById('mTeam').value;
  const saison=document.getElementById('mSaison').value.trim();
  if(!saison)return;
  const {data,error}=await sb.from('seasons').insert({team,saison}).select().single();
  if(error){showToast('Fehler: '+error.message,'error');return;}
  seasons.push({...data,_players:[],_events:[],_attendance:[],_goals:[]});
  currentSeason=seasons[seasons.length-1];
  buildSeasonDropdown();
  closeModal();renderStats();renderPlayerTable();renderEingabe();
  showToast('Saison angelegt ✓','success');
}

async function savePlayer(editId){
  const name=document.getElementById('mPlayerName').value.trim();
  if(!name)return;
  const updates={name};
  // Store photo as base64 in DB (small images only – for production use Supabase Storage)
  if(photoDataUrl)updates.photo_url=photoDataUrl;
  if(editId){
    const {error}=await sb.from('players').update(updates).eq('id',editId);
    if(error){showToast('Fehler','error');return;}
    const p=currentSeason._players.find(p=>p.id===editId);
    if(p){p.name=name;if(photoDataUrl)p.photo_url=photoDataUrl;}
  }else{
    const {data,error}=await sb.from('players').insert({...updates,season_id:currentSeason.id}).select().single();
    if(error){showToast('Fehler','error');return;}
    currentSeason._players.push(data);
  }
  photoDataUrl=null;
  closeModal();closePlayer();
  renderPlayerTable();renderEingabe();
  showToast('Spieler gespeichert ✓','success');
}

async function saveEvent(){
  const type=document.getElementById('mEvType').value;
  const date=document.getElementById('mEvDate').value;
  if(!date)return;
  const {data,error}=await sb.from('events').insert({type,date,season_id:currentSeason.id}).select().single();
  if(error){showToast('Fehler','error');return;}
  currentSeason._events.push(data);
  closeModal();renderStats();renderPlayerTable();renderEingabe();
  showToast('Angelegt ✓','success');
  setTimeout(()=>showModal('attendance',data.id),400);
}

  status.textContent='Anwesenheit wird importiert…';
  const attInserts=[];
  for(const p of PLAYERS){
    const pid=plMap[p.name.trim()];
    if(!pid)continue;
    for(const ev of EVENTS){
      const eid=evMap[ev.date+ev.type];
      if(!eid)continue;
      const st=p.attendance[ev.date]||'na';
      attInserts.push({player_id:pid,event_id:eid,status:st});
    }
  }
  for(let i=0;i<attInserts.length;i+=500){
    await sb.from('attendance').insert(attInserts.slice(i,i+500));
  }

  status.textContent='✓ E-Jugend 2025/26 importiert! ('+PLAYERS.length+' Spieler, '+EVENTS.length+' Events)';
  await loadSeasons();
  // Select the new season
  const newSeason=seasons.find(s=>s.saison==='2025/26'&&s.team==='E-Jugend');
  if(newSeason){currentSeason=newSeason;document.getElementById('seasonSelect').value=newSeason.id;await loadSeasonData();}
  closeModal();
  showToast('Import abgeschlossen ✓','success');
}

// ── NAVIGATION ──
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('#trainerNav .nav-btn').forEach(b=>b.classList.remove('active'));
  const idx={saison:0,eingabe:1,auswertung:2,eltern:3};
  document.querySelectorAll('#trainerNav .nav-btn')[idx[v]]?.classList.add('active');
  if(v==='eingabe')renderEingabe();
  if(v==='auswertung')renderAuswertung();
  if(v==='eltern')renderEltern();
}

// ── TOAST ──
let toastTimer;
function showToast(msg,type='success'){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.className='toast '+type;el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',3000);
}
</script>
