<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SG Achslach-Gotteszell</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#2D6A4F;--green-l:#52B788;--green-pale:#D8F3DC;
  --amber:#E07A00;--amber-pale:#FFF3CD;
  --red:#C62828;--red-pale:#FFEBEE;
  --blue:#185FA5;--blue-pale:#E6F1FB;
  --g0:#F8F9FA;--g1:#F1F3F5;--g2:#E9ECEF;--g3:#DEE2E6;
  --g5:#ADB5BD;--g7:#495057;--g9:#212529;
  --sh:0 1px 4px rgba(0,0,0,.08);--sh2:0 4px 20px rgba(0,0,0,.13);--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--g1);color:var(--g9);min-height:100vh;}

/* HEADER */
.header{background:var(--green);color:white;padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header-title{font-size:15px;font-weight:600;}
.header-sub{font-size:11px;opacity:.7;}
.header-nav{margin-left:auto;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.nav-btn{padding:6px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:white;font-size:12px;font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.3);}
.trainer-info{font-size:11px;opacity:.7;margin-left:4px;}

/* SEASON DROPDOWN BAR */
.season-bar{background:white;border-bottom:1px solid var(--g2);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.season-select{padding:7px 12px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:13px;font-weight:500;background:white;color:var(--g9);cursor:pointer;outline:none;min-width:180px;}
.season-select:focus{border-color:var(--green);}
.season-label{font-size:12px;color:var(--g5);}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:20px;}
.login-card{background:white;border-radius:16px;padding:36px;box-shadow:var(--sh2);width:100%;max-width:380px;}
.login-logo{text-align:center;font-size:40px;margin-bottom:8px;}
.login-title{text-align:center;font-size:20px;font-weight:600;margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:var(--g5);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:500;color:var(--g7);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--green);}
.btn-primary{width:100%;padding:11px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.err-msg{color:var(--red);font-size:12px;margin-top:8px;text-align:center;}

/* CONTENT */
.content{padding:20px;max-width:1100px;margin:0 auto;}
.view{display:none;}.view.active{display:block;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:white;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.stat-value{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-sub{font-size:11px;color:var(--g5);margin-top:2px;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-input{flex:1;min-width:150px;padding:8px 12px;border-radius:8px;border:1px solid var(--g2);font-family:inherit;font-size:13px;outline:none;}
.search-input:focus{border-color:var(--green);}
.filt-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:12px;cursor:pointer;color:var(--g7);white-space:nowrap;}
.filt-btn.active{background:var(--green-pale);border-color:var(--green);color:var(--green);font-weight:500;}
.add-btn{padding:7px 14px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.add-btn.amber{background:var(--amber);}
.add-btn.gray{background:var(--g7);}

/* TABLE */
.table-wrap{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--g0);border-bottom:1px solid var(--g2);}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;}
th:hover{color:var(--g7);}
tbody tr{border-bottom:1px solid var(--g1);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--g0);}
td{padding:10px 12px;vertical-align:middle;}
.pname{font-weight:500;}
.pct-bar{display:flex;align-items:center;gap:6px;}
.bar-track{flex:1;height:5px;background:var(--g2);border-radius:3px;overflow:hidden;max-width:70px;}
.bar-fill{height:100%;border-radius:3px;}
.bg{background:var(--green-l);}.ba{background:var(--amber);}.br{background:var(--red);}
.pct-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--g7);min-width:34px;}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-green{background:var(--green-pale);color:var(--green);}
.badge-amber{background:var(--amber-pale);color:var(--amber);}
.badge-red{background:var(--red-pale);color:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal{background:white;border-radius:14px;padding:28px;width:100%;max-width:560px;box-shadow:var(--sh2);max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g5);line-height:1;}
.modal-close:hover{color:var(--g9);}
.field{margin-bottom:16px;}
.field label{font-size:12px;font-weight:500;color:var(--g7);margin-bottom:5px;display:block;}
.field input,.field select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--g3);font-family:inherit;font-size:13px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--green);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.save-bar{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;padding:11px;border-radius:8px;border:none;background:var(--green);color:white;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.btn-cancel{padding:11px 20px;border-radius:8px;border:1px solid var(--g3);background:white;font-family:inherit;font-size:14px;cursor:pointer;color:var(--g7);}

/* ATTENDANCE INPUT */
.att-header{display:flex;gap:8px;margin-bottom:8px;padding:0 10px;}
.att-header-name{flex:1;font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;}
.att-header-col{font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;width:90px;text-align:center;}
.att-grid{display:flex;flex-direction:column;gap:5px;max-height:400px;overflow-y:auto;padding:2px;}
.att-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--g0);border-radius:8px;}
.att-name{flex:1;font-size:13px;font-weight:500;}
.att-stat-inputs{display:flex;gap:6px;align-items:center;}
.att-stat-input{width:46px;padding:4px 6px;border-radius:6px;border:1px solid var(--g3);font-size:12px;text-align:center;font-family:'DM Mono',monospace;}
.att-stat-label{font-size:10px;color:var(--g5);text-align:center;}
.att-btns{display:flex;gap:5px;}
.att-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--g3);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;background:white;color:var(--g7);transition:all .12s;white-space:nowrap;}
.att-btn.anwesend{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.att-btn.abwesend{background:var(--red-pale);border-color:#FFCDD2;color:var(--red);}
.att-btn.na{background:var(--g2);border-color:var(--g3);color:var(--g5);}

/* PLAYER DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:13px;cursor:pointer;margin-bottom:18px;color:var(--g7);}
.back-btn:hover{background:var(--g0);}
.player-header{background:white;border-radius:var(--r);padding:22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh);}
.player-avatar{width:50px;height:50px;border-radius:50%;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0;}
.season-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.sc{background:white;border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.sc-title{font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
.big-num{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.dash-card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.dash-title{font-size:13px;font-weight:600;color:var(--g7);margin-bottom:14px;}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g1);}
.rank-item:last-child{border-bottom:none;}
.rn{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--g5);width:18px;}
.rname{flex:1;font-size:13px;font-weight:500;}
.rval{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;color:var(--green);}

/* PARENT VIEW */
.parent-hero{background:var(--green);color:white;border-radius:var(--r);padding:28px;margin-bottom:20px;box-shadow:var(--sh2);}
.parent-hero h2{font-size:22px;font-weight:600;margin-bottom:4px;}
.parent-hero p{font-size:13px;opacity:.8;}
.parent-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px;}
.parent-card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);text-align:center;}
.parent-card .big{font-size:32px;font-weight:600;font-family:'DM Mono',monospace;}
.parent-card .lbl{font-size:12px;color:var(--g5);margin-top:4px;}
.top-list{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px;}
.top-list-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.medal{font-size:16px;}

/* LOADING */
.spinner{text-align:center;padding:40px;color:var(--g5);font-size:13px;}
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--g9);color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;animation:fadeIn .2s;box-shadow:var(--sh2);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}}

/* RESPONSIVE */
@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .season-cards{grid-template-columns:1fr;}
  .dash-grid{grid-template-columns:1fr;}
  .parent-grid{grid-template-columns:1fr 1fr;}
  .content{padding:12px;}
  .row2,.row3{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>⚽</div>
  <div>
    <div class="header-title">SG Achslach-Gotteszell</div>
    <div class="header-sub">Jugendabteilung</div>
  </div>
  <nav class="header-nav" id="trainerNav" style="display:none;">
    <button class="nav-btn active" onclick="showView('saison')">Übersicht</button>
    <button class="nav-btn" onclick="showView('eingabe')">Eingabe</button>
    <button class="nav-btn" onclick="showView('auswertung')">Auswertung</button>
    <button class="nav-btn" onclick="showView('eltern')" style="background:rgba(255,255,255,.1);">👨‍👩‍👦 Eltern</button>
    <span class="trainer-info" id="trainerName"></span>
    <button class="nav-btn" onclick="logout()" style="background:rgba(255,255,255,.08);">Abmelden</button>
  </nav>
  <nav class="header-nav" id="parentNav" style="display:none;">
    <button class="nav-btn active" onclick="showParentView()">Übersicht</button>
    <button class="nav-btn" onclick="showView('login'); document.getElementById('parentNav').style.display='none';">← Trainer-Login</button>
  </nav>
</div>

<!-- SEASON BAR -->
<div class="season-bar" id="seasonBar" style="display:none;">
  <span class="season-label">Saison:</span>
  <select class="season-select" id="seasonSelect" onchange="selectSeasonByDropdown()"></select>
  <span id="seasonMeta" style="font-size:12px;color:var(--g5);"></span>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚽</div>
    <div class="login-title">Trainer-Login</div>
    <div class="login-sub">SG Achslach-Gotteszell</div>
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="trainer@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Einloggen</button>
    <div class="err-msg" id="loginErr"></div>
    <div style="text-align:center;margin-top:16px;">
      <button onclick="showParentView()" style="background:none;border:none;font-size:13px;color:var(--g5);cursor:pointer;font-family:inherit;">👨‍👩‍👦 Eltern-Ansicht öffnen</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none;">
<div class="content">

  <!-- SAISON VIEW -->
  <div class="view active" id="view-saison">
    <div id="saisonPlayerList">
      <div id="statsGrid" class="stats-grid"></div>
      <div class="toolbar">
        <input class="search-input" type="text" placeholder="Spieler suchen…" oninput="renderPlayerTable()">
        <button class="filt-btn active" id="fa" onclick="setFilt('all')">Alle</button>
        <button class="filt-btn" id="ft" onclick="setFilt('training')">Training</button>
        <button class="filt-btn" id="fs" onclick="setFilt('spiel')">Spiele</button>
      </div>
      <div id="playerTableArea"></div>
    </div>
    <div id="playerDetailArea" style="display:none;"></div>
  </div>

  <!-- EINGABE VIEW -->
  <div class="view" id="view-eingabe">
    <div id="eingabeContent"></div>
  </div>

  <!-- AUSWERTUNG VIEW -->
  <div class="view" id="view-auswertung">
    <div id="auswertungContent"></div>
  </div>

  <!-- ELTERN VIEW -->
  <div class="view" id="view-eltern">
    <div id="elternContent"></div>
  </div>

</div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toastEl" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const SUPABASE_URL = 'https://niorgrizesaoeclvdtiy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pb3Jncml6ZXNhb2VjbHZkdGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjIwODEsImV4cCI6MjA4OTM5ODA4MX0.qi4mcW9SWt52daMhMXUkg4XNP3wU40yYJrrKcFbIZuw';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let sb = null;
let currentUser = null;
let seasons = [];
let currentSeason = null;
let filt = 'all';
const pendingAtt = {};

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  checkSession();
});

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Einloggen…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Einloggen';
  if (error) { err.textContent = 'Falsche E-Mail oder Passwort'; return; }
  currentUser = data.user;
  showApp();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('trainerNav').style.display = 'none';
  document.getElementById('seasonBar').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('trainerNav').style.display = 'flex';
  document.getElementById('trainerName').textContent = currentUser.email.split('@')[0];
  loadSeasons();
}

// ═══════════════════════════════════════
// SEASONS
// ═══════════════════════════════════════
async function loadSeasons() {
  const { data, error } = await sb.from('seasons').select('*').order('saison');
  if (error) { showToast('Ladefehler: ' + error.message, 'error'); return; }
  seasons = data || [];
  if (seasons.length === 0) { showEmptyState(); return; }
  currentSeason = seasons[seasons.length - 1];
  buildSeasonDropdown();
  await loadSeasonData();
}

function buildSeasonDropdown() {
  const sel = document.getElementById('seasonSelect');
  sel.innerHTML = seasons.map(s =>
    `<option value="${s.id}" ${s.id === currentSeason?.id ? 'selected' : ''}>${s.team} ${s.saison}</option>`
  ).join('');
  document.getElementById('seasonBar').style.display = 'flex';
}

async function selectSeasonByDropdown() {
  const id = document.getElementById('seasonSelect').value;
  currentSeason = seasons.find(s => s.id === id);
  await loadSeasonData();
}

async function loadSeasonData() {
  if (!currentSeason) return;
  document.getElementById('playerTableArea').innerHTML = '<div class="spinner"></div>';

  const [plRes, evRes] = await Promise.all([
    sb.from('players').select('*').eq('season_id', currentSeason.id).order('name'),
    sb.from('events').select('*').eq('season_id', currentSeason.id).order('date')
  ]);
  currentSeason._players = plRes.data || [];
  currentSeason._events = evRes.data || [];

  if (currentSeason._players.length > 0 && currentSeason._events.length > 0) {
    const [attRes, goalsRes] = await Promise.all([
      sb.from('attendance').select('*').in('player_id', currentSeason._players.map(p => p.id)),
      sb.from('goals').select('*').in('player_id', currentSeason._players.map(p => p.id))
    ]);
    currentSeason._attendance = attRes.data || [];
    currentSeason._goals = goalsRes.data || [];
  } else {
    currentSeason._attendance = [];
    currentSeason._goals = [];
  }

  updateSeasonMeta();
  renderStats();
  renderPlayerTable();
  renderEingabe();
  renderAuswertung();
  renderEltern();
}

function updateSeasonMeta() {
  const s = currentSeason;
  const tr = (s._events||[]).filter(e=>e.type==='Training').length;
  const sp = (s._events||[]).filter(e=>e.type!=='Training').length;
  document.getElementById('seasonMeta').textContent = `${tr} Trainings · ${sp} Spiele · ${s._players?.length||0} Spieler`;
}

function showEmptyState() {
  document.getElementById('seasonBar').style.display = 'none';
  document.getElementById('statsGrid').innerHTML = '';
  document.getElementById('playerTableArea').innerHTML = `
    <div style="background:white;border-radius:12px;padding:32px;text-align:center;box-shadow:var(--sh);">
      <div style="font-size:32px;margin-bottom:12px;">📁</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Noch keine Daten</div>
      <div style="font-size:13px;color:var(--g5);margin-bottom:20px;">Lege eine neue Saison an oder importiere die historischen Daten.</div>

function renderStats() {
  const s = currentSeason;
  const tr = (s._events||[]).filter(e=>e.type==='Training').length;
  const sp = (s._events||[]).filter(e=>e.type!=='Training').length;
  const pl = s._players||[];
  const att = s._attendance||[];
  const tIds = (s._events||[]).filter(e=>e.type==='Training').map(e=>e.id);
  const avg = tr>0 && pl.length>0
    ? Math.round(pl.reduce((a,p)=>a+att.filter(x=>x.player_id===p.id&&tIds.includes(x.event_id)&&x.status==='anwesend').length,0)/pl.length/tr*100)
    : 0;
  const goals = (s._goals||[]).reduce((a,g)=>a+g.goals,0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Spieler</div><div class="stat-value">${pl.length}</div><div class="stat-sub">${s.team} ${s.saison}</div></div>

    <div class="stat-card"><div class="stat-label">Ø Anwesenheit</div><div class="stat-value">${avg||'–'}${avg?'%':''}</div><div class="stat-sub">Training · ${goals} Tore gesamt</div></div>`;
}

function setFilt(f) {
  filt = f;
  ['fa','ft','fs'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(f==='all'?'fa':f==='training'?'ft':'fs').classList.add('active');

function renderPlayerTable() {
  const s = currentSeason;
  if (!s) return;
  const q = document.querySelector('#view-saison .search-input')?.value?.toLowerCase()||'';
  const players = (s._players||[]).filter(p=>p.name.toLowerCase().includes(q));
  const att = s._attendance||[];
  const goals = s._goals||[];
  const trainings = (s._events||[]).filter(e=>e.type==='Training');
  const spiele = (s._events||[]).filter(e=>e.type!=='Training');
  const tIds = trainings.map(e=>e.id);
  const sIds = spiele.map(e=>e.id);

  const enriched = players.map(p => {
    const tCount = att.filter(a=>a.player_id===p.id&&tIds.includes(a.event_id)&&a.status==='anwesend').length;
    const sCount = att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length;
    const g = goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+x.goals,0);
    const as = goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+x.assists,0);
    return {...p, tCount, sCount, goals:g, assists:as};
  }).sort((a,b)=>b.tCount-a.tCount);

  const showT = filt!=='spiel';
  const showS = filt!=='training';

  let html = `<div class="table-wrap"><table><thead><tr>
    <th>Name</th>
    ${showT?`<th>Training</th><th>Quote</th>`:''}
    ${showS?`<th>Spiele</th><th>Tore</th><th>Assists</th>`:''}
    <th></th>
  </tr></thead><tbody>`;

  for (const p of enriched) {
    const tp = trainings.length>0?Math.round(p.tCount/trainings.length*100):0;
    const sp = spiele.length>0?Math.round(p.sCount/spiele.length*100):0;
    const tc = tp>=75?'bg':tp>=50?'ba':'br';
    html += `<tr onclick="openPlayer('${p.id}')">
      <td class="pname">${p.name}</td>
      ${showT?`<td><b>${p.tCount}</b><span style="color:var(--g5)"> /${trainings.length}</span></td>
        <td><div class="pct-bar"><div class="bar-track"><div class="bar-fill ${tc}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div></td>`:''}
      ${showS?`<td><b>${p.sCount}</b><span style="color:var(--g5)"> /${spiele.length}</span></td>
        <td><b>${p.goals}</b> ⚽</td>
        <td><b>${p.assists}</b> 🅰️</td>`:''}
      <td style="text-align:right;color:var(--g5);">›</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
    <button onclick="showModal('addPlayer')" class="add-btn">+ Spieler</button>
    <button onclick="showModal('addEvent')" class="add-btn amber">+ Training / Spiel</button>
    <button onclick="showModal('newSeason')" class="add-btn gray">+ Neue Saison</button>
  </div>`;

  document.getElementById('playerTableArea').innerHTML = html;
}

function openPlayer(pid) {
  const s = currentSeason;
  const player = s._players.find(p=>p.id===pid);
  if (!player) return;
  document.getElementById('saisonPlayerList').style.display='none';
  const det = document.getElementById('playerDetailArea');
  det.style.display='';

  const att = s._attendance||[];
  const goals = s._goals||[];
  const trainings = (s._events||[]).filter(e=>e.type==='Training');
  const spiele = (s._events||[]).filter(e=>e.type!=='Training');
  const tCount = att.filter(a=>a.player_id===pid&&trainings.map(e=>e.id).includes(a.event_id)&&a.status==='anwesend').length;
  const sCount = att.filter(a=>a.player_id===pid&&spiele.map(e=>e.id).includes(a.event_id)&&a.status==='anwesend').length;
  const totalGoals = goals.filter(x=>x.player_id===pid).reduce((a,x)=>a+x.goals,0);
  const totalAssists = goals.filter(x=>x.player_id===pid).reduce((a,x)=>a+x.assists,0);
  const tp = trainings.length>0?Math.round(tCount/trainings.length*100):0;
  const sp = spiele.length>0?Math.round(sCount/spiele.length*100):0;
  const initials = player.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

  // Heatmap
  const events = s._events||[];
  const heatmap = events.map(e=>{
    const a = att.find(a=>a.player_id===pid&&a.event_id===e.id);
    const v = a?a.status:'na';
    const col = v==='anwesend'?'#52B788':v==='abwesend'?'#FFCDD2':'#E9ECEF';
    const border = e.type!=='Training'?'2px solid #E07A00':'2px solid transparent';
    const d = new Date(e.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    return `<div title="${e.type} ${d}: ${v}" style="width:22px;height:22px;border-radius:4px;background:${col};border:${border};"></div>`;
  }).join('');

  det.innerHTML = `
    <button class="back-btn" onclick="closePlayer()">← Übersicht</button>
    <div class="player-header">
      <div class="player-avatar">${initials}</div>
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:600;">${player.name}</div>
        <div style="font-size:12px;color:var(--g5);">${s.team} ${s.saison}</div>
      </div>
      <button onclick="showModal('editPlayer','${pid}')" style="padding:7px 14px;border-radius:8px;border:1px solid var(--g2);background:white;font-family:inherit;font-size:12px;cursor:pointer;">Bearbeiten</button>
    </div>
    <div class="season-cards">
      <div class="sc"><div class="sc-title">Training</div>
        <div class="big-num" style="color:var(--green)">${tCount}<span style="font-size:16px;color:var(--g5)"> /${trainings.length}</span></div>
        <div class="pct-bar" style="margin-top:8px;"><div class="bar-track" style="max-width:100px;"><div class="bar-fill ${tp>=75?'bg':tp>=50?'ba':'br'}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div>
      </div>
      <div class="sc"><div class="sc-title">Spieleinsätze</div>
        <div class="big-num" style="color:var(--amber)">${sCount}<span style="font-size:16px;color:var(--g5)"> /${spiele.length}</span></div>
        <div class="pct-bar" style="margin-top:8px;"><div class="bar-track" style="max-width:100px;"><div class="bar-fill ${sp>=75?'bg':sp>=50?'ba':'br'}" style="width:${sp}%"></div></div><span class="pct-val">${sp}%</span></div>
      </div>
      <div class="sc"><div class="sc-title">Tore & Assists</div>
        <div style="display:flex;gap:16px;">
          <div><div class="big-num" style="color:var(--green)">${totalGoals}</div><div style="font-size:11px;color:var(--g5);">Tore ⚽</div></div>
          <div><div class="big-num" style="color:var(--blue)">${totalAssists}</div><div style="font-size:11px;color:var(--g5);">Assists 🅰️</div></div>
        </div>
      </div>
    </div>
    <div class="table-wrap" style="padding:18px;">
      <div style="font-size:13px;font-weight:600;color:var(--g7);margin-bottom:12px;">Anwesenheits-Raster ${s.saison}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">${heatmap}</div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--g5);">
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#52B788;display:inline-block;"></span>Anwesend</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#FFCDD2;display:inline-block;"></span>Abwesend</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#E9ECEF;display:inline-block;"></span>Keine Info</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;border:2px solid #E07A00;display:inline-block;"></span>Spiel</span>
      </div>
    </div>`;
}

function renderAuswertung() {
  const s = currentSeason;
  if (!s) return;
  const att = s._attendance||[];
  const goals = s._goals||[];
  const trainings = (s._events||[]).filter(e=>e.type==='Training');
  const spiele = (s._events||[]).filter(e=>e.type!=='Training');
  const tIds = trainings.map(e=>e.id);
  const sIds = spiele.map(e=>e.id);

  const enriched = (s._players||[]).map(p=>({
    name: p.name,
    tCount: att.filter(a=>a.player_id===p.id&&tIds.includes(a.event_id)&&a.status==='anwesend').length,
    sCount: att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length,

  }));

  const topT = [...enriched].sort((a,b)=>b.tCount-a.tCount).slice(0,8);

  const topA = [...enriched].sort((a,b)=>b.assists-a.assists).slice(0,8);

  const rankHtml = (list, valKey, icon) => list.map((p,i)=>
    `<div class="rank-item"><span class="rn">${i+1}.</span><span class="rname">${p.name}</span><span class="rval">${p[valKey]} ${icon}</span></div>`
  ).join('');

  // Season overview across all seasons
  const allRows = seasons.map(s=>{
    const tr2=(s._events||[]).filter(e=>e.type==='Training').length;
    const sp2=(s._events||[]).filter(e=>e.type!=='Training').length;

    const att2=s._attendance||[];
    const tIds2=(s._events||[]).filter(e=>e.type==='Training').map(e=>e.id);
    const avg2=tr2>0&&pl2.length>0?Math.round(pl2.reduce((a,p)=>a+att2.filter(x=>x.player_id===p.id&&tIds2.includes(x.event_id)&&x.status==='anwesend').length,0)/pl2.length/tr2*100):null;
    const g2=(s._goals||[]).reduce((a,g)=>a+g.goals,0);
    return `<tr style="border-bottom:1px solid var(--g1);">
      <td style="padding:9px 12px;font-weight:500;">${s.team} ${s.saison}</td>

      <td style="padding:9px 12px;">${sp2}</td>
      <td style="padding:9px 12px;">${g2}</td>
      <td style="padding:9px 12px;">${avg2!=null?`<div class="pct-bar"><div class="bar-track"><div class="bar-fill ${avg2>=75?'bg':avg2>=50?'ba':'br'}" style="width:${avg2}%"></div></div><span class="pct-val">${avg2}%</span></div>`:'–'}</td>
    </tr>`;
  }).join('');

  document.getElementById('auswertungContent').innerHTML = `
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-title">🏃 Top Training – ${s.team} ${s.saison}</div>${rankHtml(topT,'tCount','')}</div>
      <div class="dash-card"><div class="dash-title">🏅 Top Spieleinsätze – ${s.team} ${s.saison}</div>${rankHtml(topS,'sCount','')}</div>
      <div class="dash-card"><div class="dash-title">⚽ Torschützen – ${s.team} ${s.saison}</div>${rankHtml(topG,'goals','⚽')}</div>
      <div class="dash-card"><div class="dash-title">🅰️ Vorlagen – ${s.team} ${s.saison}</div>${rankHtml(topA,'assists','🅰️')}</div>
      <div class="dash-card" style="grid-column:span 2;">
        <div class="dash-title">Alle Saisons im Überblick</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr>
            ${['Saison','Spieler','Trainings','Spiele','Tore','Ø Anwesenheit'].map(h=>`<th style="text-align:left;padding:8px 12px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">${h}</th>`).join('')}
          </tr></thead>
          <tbody>${allRows}</tbody>
        </table>
      </div>
    </div>`;
}

              <div class="rank-item"><span style="font-size:16px;width:24px;">${medal(i)}</span><span class="rname">${p.name}</span><span class="rval">${p.assists}</span></div>`).join('')

      </div>
    </div>

    <div class="top-list">
      <div class="top-list-title" style="margin-bottom:12px;">Alle Spieler – Übersicht</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr>
          <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Spieler</th>

            <td style="padding:9px 10px;"><div class="pct-bar"><div class="bar-track"><div class="bar-fill ${tp>=75?'bg':tp>=50?'ba':'br'}" style="width:${tp}%"></div></div><span class="pct-val">${p.tCount}/${trainings.length}</span></div></td>

          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════
// MODALS
// ═══════════════════════════════════════
function showModal(type, extra) {
  const box = document.getElementById('modalBox');
  document.getElementById('modalOverlay').classList.remove('hidden');

  if (type==='newSeason') {
    box.innerHTML=`<div class="modal-title">Neue Saison <button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="row2">
        <div class="field"><label>Team</label>
          <select id="mTeam"><option>E-Jugend</option><option>F-Jugend</option><option>D-Jugend</option><option>C-Jugend</option></select></div>
        <div class="field"><label>Saison (z.B. 2026/27)</label><input id="mSaison" placeholder="2026/27"></div>
      </div>
      <div class="save-bar"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveSeason()">Anlegen</button></div>`;
  }
  else if (type==='addPlayer') {
    box.innerHTML=`<div class="modal-title">Spieler hinzufügen <button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="field"><label>Name (Nachname Vorname)</label><input id="mPlayerName" placeholder="Mustermann Max"></div>
      <div class="save-bar"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="savePlayer()">Hinzufügen</button></div>`;
  }
  else if (type==='editPlayer') {
    const p = currentSeason._players.find(p=>p.id===extra);
    box.innerHTML=`<div class="modal-title">Spieler bearbeiten <button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="field"><label>Name</label><input id="mPlayerName" value="${p?.name||''}"></div>
      <div class="save-bar"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="savePlayer('${extra}')">Speichern</button></div>`;
  }
  else if (type==='addEvent') {
    const today = new Date().toISOString().split('T')[0];
    box.innerHTML=`<div class="modal-title">Training / Spiel anlegen <button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="row2">
        <div class="field"><label>Typ</label>
          <select id="mEvType"><option>Training</option><option>Spiel</option><option>Test - Spiel</option></select></div>
        <div class="field"><label>Datum</label><input id="mEvDate" type="date" value="${today}"></div>
      </div>
      <div class="save-bar"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveEvent()">Anlegen & Anwesenheit erfassen</button></div>`;
  }
  else if (type==='attendance') {
    const event = currentSeason._events.find(e=>e.id===extra);
    const players = currentSeason._players;
    const att = currentSeason._attendance;
    const goals = currentSeason._goals||[];
    const isSpiel = event?.type !== 'Training';
    const date = new Date(event?.date).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

    const rows = players.map(p=>{
      const existing = att.find(a=>a.player_id===p.id&&a.event_id===extra);
      const status = existing?.status||'na';
      const g = goals.find(x=>x.player_id===p.id&&x.event_id===extra);
      const gVal = g?.goals||0;
      const aVal = g?.assists||0;
      return `<div class="att-row" id="arow-${p.id}">
        <span class="att-name">${p.name}</span>
        ${isSpiel?`<div class="att-stat-inputs">
          <div style="text-align:center;">
            <input class="att-stat-input" type="number" min="0" max="20" value="${gVal}" id="goal-${p.id}" placeholder="0">
            <div class="att-stat-label">⚽ Tore</div>
          </div>
          <div style="text-align:center;">
            <input class="att-stat-input" type="number" min="0" max="20" value="${aVal}" id="asst-${p.id}" placeholder="0">
            <div class="att-stat-label">🅰️ Assists</div>
          </div>
        </div>`:''}
        <div class="att-btns">
          <button class="att-btn ${status==='anwesend'?'anwesend':''}" onclick="setAtt('${p.id}','${extra}','anwesend')">✓ Anwesend</button>
          <button class="att-btn ${status==='abwesend'?'abwesend':''}" onclick="setAtt('${p.id}','${extra}','abwesend')">✗ Abwesend</button>
          <button class="att-btn ${status==='na'?'na':''}" onclick="setAtt('${p.id}','${extra}','na')">–</button>
        </div>
      </div>`;
    }).join('');

    box.innerHTML=`<div class="modal-title">${event?.type} – ${date} <button class="modal-close" onclick="closeModal()">×</button></div>
      ${isSpiel?`<div style="font-size:12px;color:var(--g5);margin-bottom:12px;">Tore und Assists nur für anwesende Spieler eingeben.</div>`:''}
      <div class="att-header">
        <span class="att-header-name">Spieler</span>
        ${isSpiel?`<span class="att-header-col">Stats</span>`:''}
        <span class="att-header-col">Anwesenheit</span>
      </div>
      <div class="att-grid">${rows}</div>
      <div class="save-bar">
        <button class="btn-cancel" onclick="closeModal()">Schließen</button>
        <button class="btn-save" onclick="saveAllAttendance('${extra}',${isSpiel})">Alle speichern</button>
      </div>`;
  }
  else if (type==='import') {
    box.innerHTML=`<div class="modal-title">Historische Daten <button class="modal-close" onclick="closeModal()">×</button></div>
      <div style="font-size:13px;color:var(--g7);line-height:1.6;margin-bottom:20px;">
        Importiert alle 3 Saisons aus der Excel-Datei:<br><br>
        • F-Jugend 2023/24 – 25 Spieler<br>
        • E-Jugend 2024/25 – 20 Spieler<br>
        • E-Jugend 2025/26 – 31 Spieler<br><br>
        <strong>Dauert ca. 1–2 Minuten.</strong>
      </div>
      <div id="importStatus" style="font-size:12px;color:var(--g5);min-height:20px;"></div>
      <div class="save-bar">
        <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn-save" id="importBtn" onclick="importHistoricData()">Import starten</button>
      </div>`;
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

// ═══════════════════════════════════════
// ATTENDANCE STATE
// ═══════════════════════════════════════
function setAtt(pid, eid, status) {
  if (!pendingAtt[eid]) pendingAtt[eid]={};
  pendingAtt[eid][pid]=status;
  const row = document.getElementById(`arow-${pid}`);
  if (!row) return;
  row.querySelectorAll('.att-btn').forEach(b=>{
    b.classList.remove('anwesend','abwesend','na');
    const s = b.textContent.includes('Anwesend')?'anwesend':b.textContent.includes('Abwesend')?'abwesend':'na';
    if(s===status) b.classList.add(status);
  });
}

async function saveAllAttendance(eid, isSpiel) {
  const attToSave = pendingAtt[eid]||{};
  const players = currentSeason._players;

  // Build all attendance for players that have been interacted with
  // Also check current state of buttons for any not in pendingAtt
  const allAtt = players.map(p=>{
    const row = document.getElementById(`arow-${p.id}`);
    let status = attToSave[p.id];
    if (!status && row) {
      const active = row.querySelector('.att-btn.anwesend,.att-btn.abwesend,.att-btn.na');
      if (active) status = active.classList.contains('anwesend')?'anwesend':active.classList.contains('abwesend')?'abwesend':'na';
    }
    if (!status) return null;
    return { player_id: p.id, event_id: eid, status };
  }).filter(Boolean);

  if (allAtt.length>0) {
    const { error } = await sb.from('attendance').upsert(allAtt, { onConflict:'player_id,event_id' });
    if (error) { showToast('Fehler: '+error.message,'error'); return; }
  }

  // Save goals/assists if it's a game
  if (isSpiel) {
    const goalsToSave = players.map(p=>{
      const gEl = document.getElementById(`goal-${p.id}`);
      const aEl = document.getElementById(`asst-${p.id}`);
      if (!gEl&&!aEl) return null;
      const g = parseInt(gEl?.value)||0;
      const a = parseInt(aEl?.value)||0;
      if (g===0&&a===0) return null;
      return { player_id:p.id, event_id:eid, goals:g, assists:a };
    }).filter(Boolean);

    if (goalsToSave.length>0) {
      await sb.from('goals').upsert(goalsToSave, { onConflict:'player_id,event_id' });
    }
  }

  delete pendingAtt[eid];
  showToast('Gespeichert ✓','success');
  closeModal();
  await loadSeasonData();
}

// ═══════════════════════════════════════
// SAVE HELPERS
// ═══════════════════════════════════════
async function saveSeason() {
  const team = document.getElementById('mTeam').value;
  const saison = document.getElementById('mSaison').value.trim();
  if (!saison) return;
  const { data, error } = await sb.from('seasons').insert({team,saison}).select().single();
  if (error) { showToast('Fehler: '+error.message,'error'); return; }
  seasons.push({...data,_players:[],_events:[],_attendance:[],_goals:[]});
  currentSeason = seasons[seasons.length-1];
  buildSeasonDropdown();
  closeModal();
  renderStats(); renderPlayerTable(); renderEingabe();
  showToast('Saison angelegt ✓','success');
}

async function savePlayer(editId) {
  const name = document.getElementById('mPlayerName').value.trim();
  if (!name) return;
  if (editId) {
    const { error } = await sb.from('players').update({name}).eq('id',editId);
    if (error) { showToast('Fehler','error'); return; }
    const p = currentSeason._players.find(p=>p.id===editId);
    if(p) p.name=name;
  } else {
    const { data, error } = await sb.from('players').insert({name,season_id:currentSeason.id}).select().single();
    if (error) { showToast('Fehler','error'); return; }
    currentSeason._players.push(data);
  }
  closeModal(); closePlayer();
  renderPlayerTable(); renderEingabe();
  showToast('Spieler gespeichert ✓','success');
}

async function saveEvent() {
  const type = document.getElementById('mEvType').value;
  const date = document.getElementById('mEvDate').value;
  if (!date) return;
  const { data, error } = await sb.from('events').insert({type,date,season_id:currentSeason.id}).select().single();
  if (error) { showToast('Fehler','error'); return; }
  currentSeason._events.push(data);
  closeModal();
  renderStats(); renderPlayerTable(); renderEingabe();
  showToast('Angelegt – jetzt Anwesenheit erfassen ✓','success');
  setTimeout(()=>showModal('attendance',data.id),400);
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('#trainerNav .nav-btn').forEach(b=>b.classList.remove('active'));
  const idx={saison:0,eingabe:1,auswertung:2,eltern:3};
  document.querySelectorAll('#trainerNav .nav-btn')[idx[v]]?.classList.add('active');
  document.getElementById('seasonBar').style.display = v==='eltern' ? 'flex' : (currentUser ? 'flex' : 'none');
  if(v==='eingabe') renderEingabe();
  if(v==='auswertung') renderAuswertung();
  if(v==='eltern') renderEltern();
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg,type='success'){
  const el=document.getElementById('toastEl');
  el.textContent=msg; el.className='toast '+type;
  el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',3000);
}
