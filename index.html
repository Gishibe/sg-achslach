<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SG Achslach-Gotteszell</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bl:#1a3d8f;--blm:#2251b8;--bll:#3a6bdf;--blp:#e8eefb;--blu:#f0f4fd;
  --gd:#e8a020;--gdp:#fff8e6;
  --gr:#c0392b;--grp:#fdecea;
  --gre:#1a7a3a;--grep:#e8f5eb;
  --dk:#1a1a2e;--mid:#6b6b8a;--lt:#a0a0b8;
  --bd:#e2e4f0;--bg:#f6f7fb;--ul:#fafbff;
  --sh:0 2px 8px rgba(26,61,143,.10);--shl:0 8px 32px rgba(26,61,143,.15);
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--dk);}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--bl),var(--blm));color:#fff;
  display:flex;align-items:center;gap:12px;padding:0 20px;height:60px;
  position:sticky;top:0;z-index:200;box-shadow:0 3px 14px rgba(26,61,143,.35);}
.hdr-logo{width:42px;height:42px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(255,255,255,.4);cursor:pointer;flex-shrink:0;
  transition:transform .15s;}
.hdr-logo:hover{transform:scale(1.1);}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;line-height:1.1;}
.hdr-sub{font-size:10px;opacity:.65;letter-spacing:.8px;text-transform:uppercase;}
.hdr-nav{margin-left:auto;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.nb{padding:6px 12px;border-radius:20px;border:none;
  background:rgba(255,255,255,.12);color:#fff;font-family:'Barlow',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;}
.nb:hover,.nb.on{background:rgba(255,255,255,.28);}
.chip{font-size:11px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;}

/* ── SEASON BAR ── */
.sbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(26,61,143,.05);}
.s-lbl{font-size:10px;font-weight:700;color:var(--lt);text-transform:uppercase;letter-spacing:.6px;}
.s-sel{padding:6px 12px;border-radius:8px;border:2px solid var(--bd);font-family:'Barlow',sans-serif;
  font-size:13px;font-weight:600;background:#fff;color:var(--dk);cursor:pointer;outline:none;min-width:180px;}
.s-sel:focus{border-color:var(--bll);}
.s-meta{font-size:11px;color:var(--lt);font-weight:500;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 60px);padding:20px;
  background:linear-gradient(160deg,var(--blu) 0%,var(--bg) 100%);}
.lcard{background:#fff;border-radius:var(--rl);padding:36px;box-shadow:var(--shl);
  width:100%;max-width:380px;border-top:4px solid var(--blm);}
.lcard .llogo{display:flex;justify-content:center;margin-bottom:14px;}
.lcard img{width:80px;height:80px;object-fit:contain;}
.lcard h2{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;
  font-weight:800;text-transform:uppercase;color:var(--bl);margin-bottom:4px;}
.lcard p{text-align:center;font-size:13px;color:var(--lt);margin-bottom:24px;}
.lbl{font-size:11px;font-weight:700;color:var(--mid);margin-bottom:5px;display:block;
  text-transform:uppercase;letter-spacing:.4px;}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:2px solid var(--bd);
  font-family:'Barlow',sans-serif;font-size:14px;outline:none;margin-bottom:14px;
  transition:border-color .15s;color:var(--dk);}
.inp:focus{border-color:var(--blm);}
.btn-main{width:100%;padding:12px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--blm),var(--bll));color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;cursor:pointer;
  box-shadow:0 4px 12px rgba(34,81,184,.4);}
.err{color:var(--gr);font-size:12px;margin-top:6px;text-align:center;font-weight:500;min-height:18px;}
.btn-ghost{width:100%;margin-top:12px;padding:9px;border-radius:8px;
  border:2px solid var(--bd);background:#fff;font-family:'Barlow',sans-serif;
  font-size:13px;color:var(--mid);cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:var(--bll);color:var(--bl);}

/* ── LAYOUT ── */
.page{padding:20px;max-width:1160px;margin:0 auto;}
.view{display:none;}.view.on{display:block;}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.scard{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);
  border-left:4px solid var(--blm);}
.scard .lbl{font-size:10px;font-weight:700;color:var(--lt);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:5px;}
.scard .val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--bl);}
.scard .sub{font-size:11px;color:var(--lt);margin-top:3px;}

/* ── OVERVIEW PAGE ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.ov-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.ov-head{background:var(--bl);color:#fff;padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;}
.ov-head-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;}
.ov-head-count{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.ov-list{max-height:320px;overflow-y:auto;}
.ov-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid var(--bd);transition:background .1s;}
.ov-row:last-child{border-bottom:none;}
.ov-row:hover{background:var(--blu);}
.ov-row-name{flex:1;font-size:13px;font-weight:600;}
.ov-row-meta{font-size:12px;color:var(--mid);}
.ov-type-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.3px;}
.bt{background:var(--blp);color:var(--bl);}
.bs{background:var(--gdp);color:#8a5c00;}
.bts{background:#f0eeff;color:#5535cc;}
.bh{background:#e0f8f7;color:#0d7a76;}

/* ── PLAYER TABLE ── */
.tcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bl);color:#fff;}
th{padding:9px 13px;text-align:left;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--blu);}
td{padding:9px 13px;vertical-align:middle;}
.pname{font-weight:600;}
.p-av{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--bd);}
.p-ini{width:32px;height:32px;border-radius:50%;background:var(--blp);color:var(--blm);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.bar-wrap{display:flex;align-items:center;gap:6px;}
.bar-bg{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;max-width:70px;}
.bar-fg{height:100%;border-radius:3px;}
.c-g{background:linear-gradient(90deg,#1a8a3d,#2eb857);}
.c-m{background:linear-gradient(90deg,#c87a00,var(--gd));}
.c-r{background:linear-gradient(90deg,#a32020,var(--gr));}
.bv{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  color:var(--mid);min-width:32px;}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;
  font-weight:700;font-family:'Barlow Condensed',sans-serif;}
.pg{background:var(--gdp);color:#8a5c00;}.pb{background:var(--blp);color:var(--bl);}

/* ── CALENDAR ── */
.cal-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:16px;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  color:var(--bl);text-transform:uppercase;letter-spacing:.4px;}
.cal-nav{display:flex;gap:6px;}
.cal-nb{padding:5px 14px;border-radius:7px;border:2px solid var(--bd);background:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--mid);transition:all .15s;}
.cal-nb:hover{border-color:var(--bll);color:var(--bl);}
.cal-day-names{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.cal-dn{text-align:center;font-size:10px;font-weight:700;color:var(--lt);
  text-transform:uppercase;letter-spacing:.5px;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{min-height:60px;border-radius:8px;border:2px solid transparent;
  padding:5px 6px;cursor:pointer;transition:all .15s;background:var(--ul);
  display:flex;flex-direction:column;}
.cal-day:hover{border-color:var(--bll);background:var(--blu);}
.cal-day.empty{background:transparent;border:none;cursor:default;pointer-events:none;}
.cal-day.today{border-color:var(--blm)!important;background:var(--blp);}
.cal-day.other-m{opacity:.3;}
.cal-dn2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  color:var(--dk);line-height:1;margin-bottom:4px;}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;}
.cd{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.cd-t{background:var(--blm);}
.cd-s{background:var(--gd);}
.cd-ts{background:#7b68ee;}
.cd-h{background:#20b2aa;}
.cal-att{font-size:9px;color:var(--mid);margin-top:2px;line-height:1.2;}
/* Color fill for attendance rate */
.cal-day.full{background:#e8f5eb!important;border-color:#2e8b46!important;}
.cal-day.high{background:#f0faf2!important;border-color:#52b788!important;}
.cal-day.med{background:var(--gdp)!important;border-color:var(--gd)!important;}
.cal-day.low{background:var(--grp)!important;border-color:var(--gr)!important;}
.cal-leg{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.cal-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid);}
.cal-ld{width:10px;height:10px;border-radius:2px;}

/* ── MODAL ── */
.m-ov{position:fixed;inset:0;background:rgba(10,20,60,.55);display:flex;
  align-items:center;justify-content:center;z-index:300;padding:16px;
  backdrop-filter:blur(3px);}
.m-ov.h{display:none;}
.modal{background:#fff;border-radius:var(--rl);padding:26px;width:100%;
  max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.25);
  max-height:92vh;overflow-y:auto;border-top:4px solid var(--blm);}
.m-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;
  color:var(--bl);text-transform:uppercase;letter-spacing:.4px;
  margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.m-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--lt);line-height:1;}
.m-close:hover{color:var(--dk);}
.field{margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;color:var(--mid);margin-bottom:5px;
  display:block;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border-radius:8px;
  border:2px solid var(--bd);font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;color:var(--dk);transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blm);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.sbar2{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);}
.btn-sv{flex:1;padding:11px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--blm),var(--bll));color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;cursor:pointer;}
.btn-cl{padding:11px 18px;border-radius:8px;border:2px solid var(--bd);
  background:#fff;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;color:var(--mid);}

/* ── ATTENDANCE IN MODAL ── */
.att-fbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.att-fb{padding:4px 11px;border-radius:16px;border:2px solid var(--bd);background:#fff;
  font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;color:var(--mid);}
.att-fb.on{background:var(--blp);border-color:var(--blm);color:var(--bl);}
.att-list{display:flex;flex-direction:column;gap:4px;max-height:360px;overflow-y:auto;padding:2px;}
.att-row{display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--ul);border-radius:7px;border:1px solid var(--bd);}
.att-row:hover{background:var(--blu);}
.att-name{flex:1;font-size:13px;font-weight:600;}
.g-inputs{display:flex;gap:5px;align-items:center;}
.gi{width:44px;padding:4px 5px;border-radius:5px;border:2px solid var(--bd);
  font-size:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;outline:none;}
.gi:focus{border-color:var(--blm);}
.gi-lbl{font-size:9px;color:var(--lt);text-align:center;font-weight:700;letter-spacing:.2px;}
.att-btns{display:flex;gap:3px;}
.att-b{padding:4px 9px;border-radius:5px;border:2px solid var(--bd);font-size:12px;
  font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;background:#fff;color:var(--mid);}
.att-b.ja{background:var(--grep);border-color:var(--gre);color:var(--gre);}
.att-b.ne{background:var(--grp);border-color:var(--gr);color:var(--gr);}
.att-b.na{background:var(--bg);border-color:var(--bd);color:var(--lt);}

/* ── PLAYER DETAIL ── */
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;
  border-radius:8px;border:2px solid var(--bd);background:#fff;font-family:'Barlow',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;color:var(--mid);}
.back-btn:hover{border-color:var(--bll);color:var(--bl);}
.p-hero{background:linear-gradient(135deg,var(--bl),var(--blm));border-radius:var(--rl);
  padding:22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shl);color:#fff;}
.p-av-lg{width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.4);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;object-fit:cover;}
.p-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;}
.p-sub{font-size:12px;opacity:.7;margin-top:2px;}
.pcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.pcard{background:#fff;border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);}
.pcard .pt{font-size:10px;font-weight:700;color:var(--lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.pcard .pv{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;line-height:1;}
.pcard .ps{font-size:11px;color:var(--lt);margin-top:2px;}

/* ── HEATMAP ── */
.hm-card{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:16px;}
.hm-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  color:var(--bl);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.hm-dots{display:flex;flex-wrap:wrap;gap:4px;}
.hm-d{width:22px;height:22px;border-radius:4px;cursor:default;}
.hm-d:hover{transform:scale(1.3);}
.hm-leg{display:flex;gap:12px;margin-top:9px;flex-wrap:wrap;}
.hm-li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mid);}
.hm-ld{width:9px;height:9px;border-radius:2px;}

/* ── DASHBOARD ── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.dc{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.dt{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;
  color:var(--bl);text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blp);}
.rr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);}
.rr:last-child{border-bottom:none;}
.rm{font-size:16px;width:22px;text-align:center;}
.rp{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--lt);width:18px;text-align:center;}
.rn{flex:1;font-size:13px;font-weight:600;}
.rv{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--bl);}

/* ── ELTERN ── */
.e-hero{background:linear-gradient(135deg,var(--bl),var(--blm) 60%,var(--bll));
  border-radius:var(--rl);padding:28px;margin-bottom:20px;color:#fff;
  box-shadow:var(--shl);position:relative;overflow:hidden;}
.e-hero::after{content:"⚽";position:absolute;right:-8px;bottom:-18px;
  font-size:110px;opacity:.07;}
.e-hero h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.e-hero p{font-size:13px;opacity:.8;}
.e-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.e-stat{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);
  text-align:center;border-bottom:3px solid var(--blm);}
.e-stat .big{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:var(--bl);}
.e-stat .lbl{font-size:10px;color:var(--lt);margin-top:4px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;}
.e-ranks{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.e-rank{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.e-rt{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  color:var(--bl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.e-all{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.e-at{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;
  color:var(--bl);text-transform:uppercase;letter-spacing:.4px;
  margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blp);}

/* ── TOOLBAR ── */
.tb{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.sw{position:relative;flex:1;min-width:150px;}
.sw .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;}
.srch{width:100%;padding:8px 11px 8px 32px;border-radius:8px;border:2px solid var(--bd);
  font-family:'Barlow',sans-serif;font-size:13px;outline:none;}
.srch:focus{border-color:var(--bll);}
.fb{padding:7px 12px;border-radius:8px;border:2px solid var(--bd);background:#fff;
  font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--mid);}
.fb.on{background:var(--blp);border-color:var(--blm);color:var(--bl);}
.ab{padding:7px 14px;border-radius:8px;border:none;background:var(--blm);color:#fff;
  font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ab:hover{background:var(--bll);}
.ab.am{background:#c87a00;}.ab.sl{background:#5a6380;}

/* ── PHOTO UPLOAD ── */
.ph-up{border:2px dashed var(--bd);border-radius:9px;padding:16px;text-align:center;
  cursor:pointer;transition:all .15s;margin-bottom:10px;}
.ph-up:hover{border-color:var(--bll);background:var(--blu);}
.ph-prev{width:70px;height:70px;border-radius:50%;object-fit:cover;
  margin:0 auto 7px;display:block;border:3px solid var(--blp);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:400;background:var(--dk);
  color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;
  animation:su .2s;box-shadow:0 6px 20px rgba(0,0,0,.2);}
.toast.ok{background:linear-gradient(135deg,#1a5c2a,#2e8b46);}
.toast.er{background:linear-gradient(135deg,#7a1010,var(--gr));}
@keyframes su{from{opacity:0;transform:translateY(10px);}}

/* ── EMPTY ── */
.empty{background:#fff;border-radius:var(--rl);padding:44px 28px;text-align:center;box-shadow:var(--sh);}
.empty .ei{font-size:44px;margin-bottom:14px;}
.empty .et{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  color:var(--bl);text-transform:uppercase;margin-bottom:7px;}
.empty .es{font-size:13px;color:var(--mid);margin-bottom:20px;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .cal-day{min-height:46px;}
  .cal-att{display:none;}
  .ov-grid,.dgrid,.e-ranks{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .sgrid{grid-template-columns:1fr 1fr;}
  .pcards{grid-template-columns:1fr 1fr;}
  .e-stats{grid-template-columns:1fr 1fr;}
  .page{padding:12px;}
  .r2,.r3{grid-template-columns:1fr;}
  .hdr-nav .nb:not(.on):nth-child(n+3){display:none;}
}
</style>

  btn.disabled = true; btn.textContent = 'Einloggen…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    btn.disabled = false; btn.textContent = 'Einloggen';
    if (error) {
      if (error.message.includes('Invalid') || error.message.includes('invalid'))
        errEl.textContent = 'Falsche E-Mail oder Passwort.';
      else errEl.textContent = 'Fehler: ' + error.message;
      return;
    }
    user = data.user; startApp();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Einloggen';
    errEl.textContent = 'Netzwerkfehler: ' + e.message;
  }
}

// ── DATA LOADING ──
async function loadSeasons() {
  const { data, error } = await sb.from('seasons').select('*').order('saison');
  if (error) { toast('Ladefehler: ' + error.message, 'er'); return; }
  seasons = data || [];
  if (!seasons.length) { showEmpty(); return; }
  cur = seasons[seasons.length - 1];
  buildDropdown();
  await loadCurData();
}

function buildDropdown() {
  const sel = document.getElementById('sSel');
  sel.innerHTML = seasons.map(s =>
    `<option value="${s.id}"${s.id === cur?.id ? ' selected' : ''}>${s.team} ${s.saison}</option>`
  ).join('');
  document.getElementById('sbar').style.display = 'flex';
}

async function pickSeason() {
  const id = document.getElementById('sSel').value;
  cur = seasons.find(s => s.id === id);
  await loadCurData();
}

async function loadCurData() {
  if (!cur) return;
  document.getElementById('playerList').innerHTML =
    '<div style="padding:40px;text-align:center;color:var(--lt);font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;">LADE…</div>';

  const [plR, evR] = await Promise.all([
    sb.from('players').select('*').eq('season_id', cur.id).order('name'),
    sb.from('events').select('*').eq('season_id', cur.id).order('date')
  ]);
  cur._pl = plR.data || [];
  cur._ev = evR.data || [];

  if (cur._pl.length && cur._ev.length) {
    const pids = cur._pl.map(p => p.id);
    const eids = cur._ev.map(e => e.id);
    const [attR, gR] = await Promise.all([
      sb.from('attendance').select('*').in('player_id', pids),
      sb.from('goals').select('*').in('event_id', eids).catch(() => ({ data: [] }))
    ]);
    cur._att = attR.data || [];
    cur._goals = gR.data || [];
  } else { cur._att = []; cur._goals = []; }

  updateMeta();
  renderAll();
}

function updateMeta() {
  const tr = (cur._ev||[]).filter(e => e.type === 'Training').length;
  const sp = (cur._ev||[]).filter(e => e.type !== 'Training').length;
  document.getElementById('sMeta').textContent =
    `${tr} Trainings · ${sp} Spiele · ${(cur._pl||[]).length} Spieler`;
}

function renderAll() {
  renderStats();
  renderOverview();
  renderPlayerTable();
  const active = document.querySelector('.view.on');
  const id = active?.id?.replace('view-', '');
  if (id === 'eingabe') renderEingabe();
  if (id === 'auswertung') renderAuswertung();
  if (id === 'eltern') renderEltern();
}

function showEmpty() {
  document.getElementById('sbar').style.display = 'none';
  document.getElementById('statsArea').innerHTML = '';
  document.getElementById('ovGrid').innerHTML = '';
  document.getElementById('playerList').innerHTML = `
    <div class="empty">
      <div class="ei">⚽</div>
      <div class="et">Noch keine Daten</div>

      <button onclick="showM('import')" class="ab" style="padding:11px 22px;font-size:13px;margin-right:8px;">📥 Daten importieren</button>
      <button onclick="showM('newSeason')" class="ab sl" style="padding:11px 22px;font-size:13px;">+ Neue Saison</button>

// ── HELPERS ──
function av(p, sz=32) {
  if (p.photo_url) return `<img class="p-av" style="width:${sz}px;height:${sz}px;" src="${p.photo_url}">`;
  const ini = (p.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return `<span class="p-ini" style="width:${sz}px;height:${sz}px;font-size:${sz*0.34}px;">${ini}</span>`;
}
function bc(p) { return p >= 75 ? 'c-g' : p >= 50 ? 'c-m' : 'c-r'; }
function typeBadge(t) {
  const m = { Training:'bt Training', Spiel:'bs Spiel', 'Test - Spiel':'bts Test-Spiel',
              Hallentunier:'bh Hallenturnier', Trainingsspiel:'bts Trainingsspiel' };
  return m[t] || 'bt ' + t;
}
function evDotClass(t) {
  return t==='Training'?'cd-t':t==='Spiel'||t==='Test - Spiel'?'cd-s':t==='Trainingsspiel'?'cd-ts':'cd-h';
}
function fmtDate(d, opts) {
  return new Date(d).toLocaleDateString('de-DE', opts || {day:'2-digit',month:'2-digit',year:'numeric'});
}

// ── STATS ──
function renderStats() {
  const s = cur;
  const tr = (s._ev||[]).filter(e=>e.type==='Training').length;
  const sp = (s._ev||[]).filter(e=>e.type!=='Training').length;
  const pl = s._pl||[]; const att = s._att||[];
  const tIds = (s._ev||[]).filter(e=>e.type==='Training').map(e=>e.id);
  const avg = tr>0&&pl.length>0
    ? Math.round(pl.reduce((a,p)=>a+att.filter(x=>x.player_id===p.id&&tIds.includes(x.event_id)&&x.status==='anwesend').length,0)/pl.length/tr*100)
    : 0;
  const goals = (s._goals||[]).reduce((a,g)=>a+(g.goals||0), 0);
  document.getElementById('statsArea').innerHTML = `
    <div class="scard"><div class="lbl">Spieler</div><div class="val">${pl.length}</div><div class="sub">${s.team} ${s.saison}</div></div>
    <div class="scard"><div class="lbl">Trainings</div><div class="val">${tr}</div><div class="sub">Einheiten</div></div>
    <div class="scard"><div class="lbl">Spiele</div><div class="val">${sp}</div><div class="sub">inkl. Testspiele</div></div>
    <div class="scard"><div class="lbl">Ø Anwesenheit</div><div class="val">${avg||'–'}${avg?'%':''}</div><div class="sub">Training · ${goals} Tore ⚽</div></div>`;
}

// ── OVERVIEW (separate Übersicht) ──
function renderOverview() {
  const s = cur;
  const pl = s._pl||[]; const att = s._att||[]; const goals = s._goals||[];
  const trs = (s._ev||[]).filter(e=>e.type==='Training');
  const sps = (s._ev||[]).filter(e=>e.type!=='Training');

  // Events list
  const evRows = [...(s._ev||[])].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12).map(e => {
    const cnt = att.filter(a=>a.event_id===e.id&&a.status==='anwesend').length;
    const gc = goals.filter(g=>g.event_id===e.id).reduce((a,g)=>a+(g.goals||0),0);
    const [bc, bt] = typeBadge(e.type).split(' ');
    const opp = e.opponent ? ` vs. ${e.opponent}` : '';
    return `<div class="ov-row" onclick="showM('attendance','${e.id}')">
      <span class="ov-type-badge ${bc}">${bt}</span>
      <span class="ov-row-name">${fmtDate(e.date)}${opp}</span>
      <span class="ov-row-meta">${cnt>0?cnt+' anwesend':'–'}${e.type!=='Training'&&gc>0?' · '+gc+'⚽':''}</span>
    </div>`;
  }).join('');

  // Player summary
  const plRows = [...pl].map(p => {
    const tC = att.filter(a=>a.player_id===p.id&&trs.map(e=>e.id).includes(a.event_id)&&a.status==='anwesend').length;
    const sC = att.filter(a=>a.player_id===p.id&&sps.map(e=>e.id).includes(a.event_id)&&a.status==='anwesend').length;
    const g = goals.filter(x=>x.player_id===p.id).reduce((a,x)=>a+(x.goals||0),0);
    const tp = trs.length>0?Math.round(tC/trs.length*100):0;
    return { ...p, tC, sC, g, tp };
  }).sort((a,b)=>b.tC-a.tC).slice(0,10).map(p => `
    <div class="ov-row" onclick="openPlayer('${p.id}')">
      ${av(p,28)}
      <span class="ov-row-name">${p.name}</span>
      <span class="ov-row-meta">${p.tC}T · ${p.sC}S${p.g>0?' · '+p.g+'⚽':''}</span>
    </div>`).join('');

  document.getElementById('ovGrid').innerHTML = `
    <div class="ov-card">
      <div class="ov-head">
        <span class="ov-head-title">⚽ Events</span>
        <span class="ov-head-count">${(s._ev||[]).length}</span>
      </div>
      <div class="ov-list">${evRows || '<div style="padding:16px;color:var(--lt);font-size:13px;">Keine Events</div>'}</div>
    </div>
    <div class="ov-card">
      <div class="ov-head">
        <span class="ov-head-title">👤 Top-Spieler</span>
        <span class="ov-head-count">${pl.length}</span>
      </div>
      <div class="ov-list">${plRows || '<div style="padding:16px;color:var(--lt);font-size:13px;">Keine Spieler</div>'}</div>
    </div>`;
}

function renderCal() {
  const s = cur; if (!s || !document.getElementById('calGrid')) return;
  const mnths = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('calTitle').textContent = `${mnths[calM]} ${calY}`;
  const att = s._att||[]; const evMap = {};
  for (const e of s._ev||[]) {
    if (!evMap[e.date]) evMap[e.date] = [];
    evMap[e.date].push(e);
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const first = new Date(calY, calM, 1);
  const last = new Date(calY, calM+1, 0);
  let dow = first.getDay(); if (dow===0) dow=7; dow--;

  let h = '';
  // Pad with empty cells
  for (let i=0; i<dow; i++) h += '<div class="cal-day empty"></div>';

  for (let d=1; d<=last.getDate(); d++) {
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs = evMap[ds]||[];
    const isToday = new Date(calY,calM,d).getTime()===today.getTime();

    // Calculate attendance rate for this day
    let attClass = '';
    if (dayEvs.length > 0 && s._pl.length > 0) {
      const totalAtt = dayEvs.reduce((sum,e) => {
        return sum + att.filter(a=>a.event_id===e.id&&a.status==='anwesend').length;
      }, 0);
      const maxPossible = dayEvs.length * s._pl.length;
      const rate = maxPossible > 0 ? totalAtt / maxPossible * 100 : 0;
      if (att.filter(a=>dayEvs.map(e=>e.id).includes(a.event_id)).length > 0) {
        attClass = rate>=75?'full':rate>=50?'high':rate>=25?'med':'low';
      }
    }

    const dots = dayEvs.map(e=>`<div class="cd ${evDotClass(e.type)}"></div>`).join('');
    const attCnt = att.filter(a=>dayEvs.map(e=>e.id).includes(a.event_id)&&a.status==='anwesend').length;
    const attTxt = dayEvs.length>0&&attCnt>0?`${attCnt} da`:'';

    h += `<div class="cal-day${isToday?' today':''}${attClass?' '+attClass:''}" onclick="calClick('${ds}')" title="${dayEvs.map(e=>e.type+(e.opponent?' vs '+e.opponent:'')).join(', ')||'Klicken zum Anlegen'}">
      <div class="cal-dn2">${d}</div>
      <div class="cal-dots">${dots}</div>
      ${attTxt?`<div class="cal-att">${attTxt}</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = h;
}

function calClick(ds) {
  const dayEvs = (cur._ev||[]).filter(e=>e.date===ds);
  if (dayEvs.length === 0) { showM('addEvent', ds); }
  else if (dayEvs.length === 1) { showM('attendance', dayEvs[0].id); }
  else {
    // Show mini picker in event list
    document.getElementById('evListTitle').textContent = fmtDate(ds, {day:'2-digit',month:'long'});

function renderAuswertung() {

  const trs = (s._ev||[]).filter(e=>e.type==='Training');

  const tIds = trs.map(e=>e.id); const sIds = sps.map(e=>e.id);
  const en = (s._pl||[]).map(p => ({
    ...p,

    sC: att.filter(a=>a.player_id===p.id&&sIds.includes(a.event_id)&&a.status==='anwesend').length,

  const meds = ['🥇','🥈','🥉'];

    `<div class="rr"><div class="rm">${meds[i]||''}</div><div class="rp">${i>=3?i+1:''}</div>${av(p,26)}<div class="rn">${p.name}</div><div class="rv">${p[key]} ${ico}</div></div>`

  const topT = [...en].sort((a,b)=>b.tC-a.tC).slice(0,8);

  const allRows = seasons.map(s => {

// ── ATTENDANCE ──
function filtAtt(f) {
  ['afAll','afJa','afNe','afNa'].forEach(id => document.getElementById(id)?.classList.remove('on'));
  document.getElementById(f==='all'?'afAll':f==='anwesend'?'afJa':f==='abwesend'?'afNe':'afNa')?.classList.add('on');
  document.querySelectorAll('#attList .att-row').forEach(r => {
    const st = r.getAttribute('data-st')||'na';
    r.style.display = (f==='all'||st===f) ? '' : 'none';
  });
}
function setAtt(pid, eid, st) {
  if (!pendAtt[eid]) pendAtt[eid] = {};
  pendAtt[eid][pid] = st;
  const row = document.getElementById('ar-'+pid); if (!row) return;
  row.setAttribute('data-st', st);
  row.querySelectorAll('.att-b').forEach(b => {
    b.classList.remove('ja','ne','na');
    const bs = b.textContent.trim()==='✓'?'anwesend':b.textContent.trim()==='✗'?'abwesend':'na';
    if (bs===st) b.classList.add(st==='anwesend'?'ja':st==='abwesend'?'ne':'na');
  });
}
async function saveAtt(eid, isSp) {
  const pls = cur._pl;
  const allAtt = pls.map(p => {
    const row = document.getElementById('ar-'+p.id);
    const st = (pendAtt[eid]&&pendAtt[eid][p.id]) || row?.getAttribute('data-st') || 'na';
    return { player_id: p.id, event_id: eid, status: st };
  });
  const { error: e1 } = await sb.from('attendance').upsert(allAtt, { onConflict:'player_id,event_id' });
  if (e1) { toast('Fehler Anwesenheit: '+e1.message,'er'); return; }
  if (isSp) {
    const gu = pls.map(p => ({
      player_id: p.id, event_id: eid,
      goals: parseInt(document.getElementById('gol-'+p.id)?.value)||0,
      assists: parseInt(document.getElementById('ast-'+p.id)?.value)||0,
    }));
    const { error: e2 } = await sb.from('goals').upsert(gu, { onConflict:'player_id,event_id' });
    if (e2) { toast('Fehler Tore: '+e2.message,'er'); return; }
  }
  delete pendAtt[eid];
  toast('Gespeichert ✓','ok');
  closeM();
  await loadCurData();
}

// ── SAVE HELPERS ──
function toggleOpp() {
  const t = document.getElementById('mET')?.value;
  const f = document.getElementById('oppField');
  if (f) f.style.display = (t && t!=='Training') ? 'block' : 'none';
}
function prevPh(s) {
  const file = document.getElementById('phF'+s).files[0]; if (!file) return;
  const img = new Image(); const reader = new FileReader();
  reader.onload = e => { img.src = e.target.result; };
  img.onload = () => {
    const c = document.createElement('canvas');
    const max = 200; let w=img.width,h=img.height;
    if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    photoB64 = c.toDataURL('image/jpeg',.8);
    const pr = document.getElementById('phPr'+s);
    pr.src=photoB64; pr.style.display='block';
    document.getElementById('phH'+s).textContent='Foto ändern';
  };
  reader.readAsDataURL(file);
}
async function saveSeason() {
  const team=document.getElementById('mTeam').value;
  const saison=document.getElementById('mSaison').value.trim();
  if(!saison)return;
  const{data,error}=await sb.from('seasons').insert({team,saison}).select().single();
  if(error){toast('Fehler: '+error.message,'er');return;}
  seasons.push({...data,_pl:[],_ev:[],_att:[],_goals:[]});
  cur=seasons[seasons.length-1]; buildDropdown();
  closeM(); renderAll();
  toast('Saison angelegt ✓','ok');
}
async function savePlayer(editId) {
  const name=document.getElementById('mPN').value.trim();if(!name)return;
  const upd={name};if(photoB64)upd.photo_url=photoB64;
  if(editId){
    const{error}=await sb.from('players').update(upd).eq('id',editId);
    if(error){toast('Fehler','er');return;}
    const p=cur._pl.find(p=>p.id===editId);
    if(p){p.name=name;if(photoB64)p.photo_url=photoB64;}
  }else{
    const{data,error}=await sb.from('players').insert({...upd,season_id:cur.id}).select().single();
    if(error){toast('Fehler','er');return;}
    cur._pl.push(data);
  }
  photoB64=null; closeM(); closePlayer(); renderAll();
  toast('Spieler gespeichert ✓','ok');
}
async function saveEvent() {
  const type=document.getElementById('mET').value;
  const date=document.getElementById('mED').value;if(!date)return;
  const opp=document.getElementById('mEOpp')?.value?.trim()||null;
  const ev={type,date,season_id:cur.id};if(opp)ev.opponent=opp;
  const{data,error}=await sb.from('events').insert(ev).select().single();
  if(error){toast('Fehler: '+error.message,'er');return;}
  cur._ev.push(data);
  closeM(); renderAll(); renderEingabe();
  toast('Angelegt ✓','ok');
  setTimeout(()=>showM('attendance',data.id),400);
}

// ── IMPORT ──
async function doImport() {
  const safetyTimer = setTimeout(()=>window.location.reload(), 90000);
  const btn=document.getElementById('impBtn');
  btn.disabled=true; btn.textContent='Importiere…';
  const st=document.getElementById('impSt');
  const SD=IMPORT_SEASON;
  st.textContent='Lösche bestehende E-Jugend 2025/26…';
  const{data:ex}=await sb.from('seasons').select('id').eq('team','E-Jugend').eq('saison','2025/26');
  if(ex&&ex.length){
    for(const s of ex){
      const{data:evs}=await sb.from('events').select('id').eq('season_id',s.id);
      const{data:pls}=await sb.from('players').select('id').eq('season_id',s.id);
      if(evs?.length)await sb.from('goals').delete().in('event_id',evs.map(e=>e.id));
      if(pls?.length)await sb.from('attendance').delete().in('player_id',pls.map(p=>p.id));
      await sb.from('players').delete().eq('season_id',s.id);
      await sb.from('events').delete().eq('season_id',s.id);
      await sb.from('seasons').delete().eq('id',s.id);
    }
  }
  st.textContent='Saison wird angelegt…';
  const{data:season,error:se}=await sb.from('seasons').insert({team:SD.team,saison:SD.saison}).select().single();
  if(se){clearTimeout(safetyTimer);toast('Fehler: '+se.message,'er');btn.disabled=false;btn.textContent='Import starten';return;}
  st.textContent='Events werden eingetragen…';
  const{data:insEvs}=await sb.from('events').insert(SD.events.map(e=>({season_id:season.id,type:e.type,date:e.date}))).select();
  const evMap={};(insEvs||[]).forEach(e=>evMap[e.date+'|'+e.type]=e.id);
  st.textContent='Spieler werden eingetragen…';
  const{data:insPls}=await sb.from('players').insert(SD.players.map(p=>({name:p.name,season_id:season.id}))).select();
  const plMap={};(insPls||[]).forEach(p=>plMap[p.name.trim()]=p.id);
  st.textContent='Anwesenheit wird importiert…';
  const attIns=[];
  for(const p of SD.players){
    const pid=plMap[p.name.trim()];if(!pid)continue;
    for(const ev of SD.events){
      const eid=evMap[ev.date+'|'+ev.type];if(!eid)continue;
      const status=(p.attendance&&p.attendance[ev.date])||'na';
      if(status!=='na')attIns.push({player_id:pid,event_id:eid,status});
    }
  }
  for(let i=0;i<attIns.length;i+=500)await sb.from('attendance').insert(attIns.slice(i,i+500));
  clearTimeout(safetyTimer);
  st.textContent='✓ Import abgeschlossen! Seite wird neu geladen…';
  toast('E-Jugend 2025/26 importiert ✓','ok');
  setTimeout(()=>window.location.reload(),1500);
}

// ── NAV ──
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('#trNav .nb').forEach(b=>b.classList.remove('on'));
  const idx={uebersicht:0,eingabe:1,auswertung:2,eltern:3};
  document.querySelectorAll('#trNav .nb')[idx[v]]?.classList.add('on');
  if(v==='eingabe'){calY=new Date().getFullYear();calM=new Date().getMonth();renderEingabe();}
  if(v==='auswertung')renderAuswertung();
  if(v==='eltern')renderEltern();
}

let toastT;
function toast(msg,type='ok'){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.className='toast '+type;el.style.display='block';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',3500);
}
</script>
