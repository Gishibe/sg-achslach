<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SG Achslach-Gotteszell</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2D6A4F; --green-l: #52B788; --green-pale: #D8F3DC;
  --amber: #E07A00; --amber-pale: #FFF3CD;
  --red: #C62828; --red-pale: #FFEBEE;
  --blue: #185FA5; --blue-pale: #E6F1FB;
  --g0: #F8F9FA; --g1: #F1F3F5; --g2: #E9ECEF; --g3: #DEE2E6;
  --g5: #ADB5BD; --g7: #495057; --g9: #212529;
  --sh: 0 1px 4px rgba(0,0,0,.08); --sh2: 0 4px 20px rgba(0,0,0,.12);
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--g1); color: var(--g9); min-height: 100vh; }

/* ── CONFIG BANNER ── */
#configBanner {
  background: #FFF3CD; border-bottom: 2px solid #E07A00;
  padding: 12px 20px; font-size: 13px; color: #5a3e00;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
#configBanner strong { font-weight: 600; }
#configBanner input {
  padding: 6px 10px; border-radius: 6px; border: 1px solid #E07A00;
  font-size: 12px; font-family: monospace; width: 280px;
  background: white;
}
#configBanner button {
  padding: 6px 14px; border-radius: 6px; border: none;
  background: #E07A00; color: white; font-family: inherit; font-size: 12px;
  cursor: pointer; font-weight: 500;
}

/* ── HEADER ── */
.header {
  background: var(--green); color: white; padding: 0 20px;
  display: flex; align-items: center; gap: 12px; height: 56px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header-icon { font-size: 22px; }
.header-title { font-size: 15px; font-weight: 600; }
.header-sub { font-size: 11px; opacity: .7; }
.header-nav { margin-left: auto; display: flex; gap: 4px; }
.nav-btn {
  padding: 6px 12px; border-radius: 20px; border: none;
  background: rgba(255,255,255,.15); color: white;
  font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s;
}
.nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,.3); }
.trainer-badge {
  font-size: 11px; background: rgba(255,255,255,.2);
  padding: 3px 8px; border-radius: 20px; margin-left: 8px;
}

/* ── LOGIN ── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 56px); padding: 20px;
}
.login-card {
  background: white; border-radius: 16px; padding: 36px;
  box-shadow: var(--sh2); width: 100%; max-width: 380px;
}
.login-logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
.login-title { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.login-sub { text-align: center; font-size: 13px; color: var(--g5); margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--g7); margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--g3); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color .15s;
}
.form-input:focus { border-color: var(--green); }
.btn-primary {
  width: 100%; padding: 11px; border-radius: 8px; border: none;
  background: var(--green); color: white; font-family: inherit;
  font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .9; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.err-msg { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }

/* ── SEASON TABS ── */
.season-bar {
  background: white; border-bottom: 1px solid var(--g2);
  padding: 0 20px; display: flex; gap: 0; overflow-x: auto;
}
.season-tab {
  padding: 13px 18px; border: none; background: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--g5); cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap; transition: color .15s, border-color .15s;
}
.season-tab:hover { color: var(--g7); }
.season-tab.active { color: var(--green); border-bottom-color: var(--green); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1100px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: var(--r); padding: 16px 18px; box-shadow: var(--sh); }
.stat-label { font-size: 11px; color: var(--g5); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
.stat-value { font-size: 26px; font-weight: 600; font-family: 'DM Mono', monospace; }
.stat-sub { font-size: 11px; color: var(--g5); margin-top: 2px; }

/* ── TABLE ── */
.toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.search-input {
  flex: 1; min-width: 160px; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--g2); font-family: inherit; font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--green); }
.filt-btn {
  padding: 7px 12px; border-radius: 8px; border: 1px solid var(--g2);
  background: white; font-family: inherit; font-size: 12px; cursor: pointer; color: var(--g7);
}
.filt-btn.active { background: var(--green-pale); border-color: var(--green); color: var(--green); font-weight: 500; }
.add-btn {
  padding: 7px 14px; border-radius: 8px; border: none;
  background: var(--green); color: white; font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer; margin-left: auto;
}
.table-wrap { background: white; border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--g0); border-bottom: 1px solid var(--g2); }
th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--g5); text-transform: uppercase; letter-spacing: .05em; cursor: pointer; }
th:hover { color: var(--g7); }
tbody tr { border-bottom: 1px solid var(--g1); cursor: pointer; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--g0); }
td { padding: 10px 12px; vertical-align: middle; }
.pname { font-weight: 500; }
.pct-bar { display: flex; align-items: center; gap: 6px; }
.bar-track { flex: 1; height: 5px; background: var(--g2); border-radius: 3px; overflow: hidden; max-width: 70px; }
.bar-fill { height: 100%; border-radius: 3px; }
.bg { background: var(--green-l); } .ba { background: var(--amber); } .br { background: var(--red); }
.pct-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--g7); min-width: 34px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: white; border-radius: 14px; padding: 28px;
  width: 100%; max-width: 520px; box-shadow: var(--sh2); max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--g5); padding: 0 4px; }
.modal-close:hover { color: var(--g9); }

/* ── FORM ELEMENTS ── */
.field { margin-bottom: 16px; }
.field label { font-size: 12px; font-weight: 500; color: var(--g7); margin-bottom: 5px; display: block; }
.field input, .field select {
  width: 100%; padding: 9px 11px; border-radius: 8px;
  border: 1px solid var(--g3); font-family: inherit; font-size: 13px; outline: none;
}
.field input:focus, .field select:focus { border-color: var(--green); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── ATTENDANCE INPUT ── */
.att-grid { display: flex; flex-direction: column; gap: 6px; max-height: 360px; overflow-y: auto; padding: 2px; }
.att-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  background: var(--g0); border-radius: 8px;
}
.att-name { flex: 1; font-size: 13px; font-weight: 500; }
.att-btns { display: flex; gap: 6px; }
.att-btn {
  padding: 5px 11px; border-radius: 6px; border: 1px solid var(--g3);
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
  transition: all .12s; background: white; color: var(--g7);
}
.att-btn.ja { background: var(--green-pale); border-color: var(--green); color: var(--green); }
.att-btn.nein { background: var(--red-pale); border-color: #FFCDD2; color: var(--red); }
.att-btn.na { background: var(--g2); border-color: var(--g3); color: var(--g5); }
.save-bar { display: flex; gap: 10px; margin-top: 20px; }
.btn-save {
  flex: 1; padding: 11px; border-radius: 8px; border: none;
  background: var(--green); color: white; font-family: inherit;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.btn-cancel {
  padding: 11px 20px; border-radius: 8px; border: 1px solid var(--g3);
  background: white; font-family: inherit; font-size: 14px; cursor: pointer; color: var(--g7);
}

/* ── PLAYER DETAIL ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: 8px; border: 1px solid var(--g2); background: white;
  font-family: inherit; font-size: 13px; cursor: pointer; margin-bottom: 18px; color: var(--g7);
}
.back-btn:hover { background: var(--g0); }
.player-header {
  background: white; border-radius: var(--r); padding: 22px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 16px; box-shadow: var(--sh);
}
.player-avatar {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--green-pale); color: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 600; flex-shrink: 0;
}
.season-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.sc { background: white; border-radius: var(--r); padding: 16px; box-shadow: var(--sh); }
.sc-title { font-size: 11px; font-weight: 600; color: var(--g5); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
.big-num { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* ── DASHBOARD ── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.dash-card { background: white; border-radius: var(--r); padding: 18px; box-shadow: var(--sh); }
.dash-title { font-size: 13px; font-weight: 600; color: var(--g7); margin-bottom: 14px; }
.rank-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--g1); }
.rank-item:last-child { border-bottom: none; }
.rn { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--g5); width: 18px; }
.rname { flex: 1; font-size: 13px; font-weight: 500; }
.rval { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 600; color: var(--green); }

/* ── LOADING ── */
.spinner { text-align: center; padding: 40px; color: var(--g5); font-size: 13px; }
.spinner::before { content: '⟳'; display: block; font-size: 24px; animation: spin 1s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  background: var(--g9); color: white; padding: 10px 18px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  animation: fadeIn .2s; box-shadow: var(--sh2);
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .season-cards { grid-template-columns: 1fr; }
  .dash-grid { grid-template-columns: 1fr; }
  .header-nav .nav-btn:not(.active) { display: none; }
  .content { padding: 12px; }
  #configBanner input { width: 200px; }
}
</style>
</head>
<body>

<!-- CONFIG BANNER -->
<div id="configBanner" style="display:none;">
  <strong>⚙️ Supabase verbinden:</strong>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <label style="font-size:11px;font-weight:600;">Project URL</label>
    <input id="cfgUrl" type="url" placeholder="https://abcdefgh.supabase.co" autocomplete="off" spellcheck="false">
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <label style="font-size:11px;font-weight:600;">Anon Key (eyJ…)</label>
    <input id="cfgKey" type="text" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." autocomplete="off" spellcheck="false">
  </div>
  <button onclick="saveConfig()">Verbinden</button>
  <span id="cfgStatus" style="font-size:11px;"></span>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">⚽</div>
  <div>
    <div class="header-title">SG Achslach-Gotteszell</div>
    <div class="header-sub">Jugendabteilung</div>
  </div>
  <nav class="header-nav" id="mainNav" style="display:none;">
    <button class="nav-btn active" onclick="showView('saison')">Saison</button>
    <button class="nav-btn" onclick="showView('eingabe')">Eingabe</button>
    <button class="nav-btn" onclick="showView('dashboard')">Auswertung</button>
    <span class="trainer-badge" id="trainerName"></span>
    <button class="nav-btn" onclick="logout()" style="background:rgba(255,255,255,.1);">Abmelden</button>
  </nav>
</div>

<!-- SEASON BAR -->
<div class="season-bar" id="seasonBar" style="display:none;"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚽</div>
    <div class="login-title">Trainer-Login</div>
    <div class="login-sub">SG Achslach-Gotteszell</div>
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="trainer@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Einloggen</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none;">
<div class="content">

  <!-- SAISON VIEW -->
  <div class="view active" id="view-saison">
    <div id="saisonPlayerList">
      <div id="statsGrid" class="stats-grid"></div>
      <div class="toolbar">
        <input class="search-input" type="text" placeholder="Spieler suchen…" oninput="filterPlayers()">
        <button class="filt-btn active" id="fa" onclick="setFilt('all')">Alle</button>
        <button class="filt-btn" id="ft" onclick="setFilt('training')">Training</button>
        <button class="filt-btn" id="fs" onclick="setFilt('spiel')">Spiele</button>
      </div>
      <div id="playerTableArea"></div>
    </div>
    <div id="playerDetailArea" style="display:none;"></div>
  </div>

  <!-- EINGABE VIEW -->
  <div class="view" id="view-eingabe">
    <div id="eingabeContent"></div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div class="view" id="view-dashboard">
    <div id="dashContent"></div>
  </div>

</div>
</div>

<!-- MODALS -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div id="toastEl" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════
// CONFIG & SUPABASE INIT
// ═══════════════════════════════════════════════════════
let sb = null;
let currentUser = null;
let seasons = [];
let currentSeason = null;
let filt = 'all';

function saveConfig() {
  let url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  const status = document.getElementById('cfgStatus');

  if (!url || !key) { status.textContent = '⚠ Bitte beide Felder ausfüllen'; return; }

  // Auto-fix common mistakes
  url = url.replace(/\s+/g, '');           // remove all spaces
  url = url.replace(/\/+$/, '');           // remove trailing slashes
  if (!url.startsWith('http')) url = 'https://' + url;

  // Validate
  try { new URL(url); } catch(e) {
    status.textContent = '✗ URL ungültig – Beispiel: https://xyz.supabase.co';
    return;
  }
  if (!url.includes('supabase.co') && !url.includes('supabase.com')) {
    status.textContent = '⚠ Sieht nicht wie eine Supabase-URL aus – trotzdem versuchen…';
  }

  document.getElementById('cfgUrl').value = url; // show cleaned value
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  initSupabase(url, key);
}

function initSupabase(url, key) {
  try {
    sb = window.supabase.createClient(url, key);
    checkSession();
  } catch(e) {
    document.getElementById('cfgStatus').textContent = '✗ Fehler: ' + e.message;
    localStorage.removeItem('sb_url');
    localStorage.removeItem('sb_key');
  }
}

// Pre-configured – kein Setup nötig
const SUPABASE_URL = 'https://niorgrizesaoeclvdtiy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pb3Jncml6ZXNhb2VjbHZkdGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjIwODEsImV4cCI6MjA4OTM5ODA4MX0.qi4mcW9SWt52daMhMXUkg4XNP3wU40yYJrrKcFbIZuw';

document.addEventListener('DOMContentLoaded', function() {
  initSupabase(SUPABASE_URL, SUPABASE_KEY);
});

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function checkSession() {
  if (!sb) return;
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
}

async function doLogin() {
  if (!sb) { showToast('Bitte zuerst Supabase konfigurieren', 'error'); return; }
  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Einloggen…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Einloggen';
  if (error) { document.getElementById('loginErr').textContent = 'Falsche E-Mail oder Passwort'; return; }
  currentUser = data.user;
  showApp();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainNav').style.display = 'none';
  document.getElementById('seasonBar').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('mainNav').style.display = 'flex';
  document.getElementById('trainerName').textContent = currentUser.email.split('@')[0];
  loadSeasons();
}

// ═══════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════
async function loadSeasons() {
  if (!sb) return;
  const { data, error } = await sb.from('seasons').select('*').order('saison');
  if (error) { showToast('Fehler beim Laden der Saisons', 'error'); return; }

  // If no data yet, offer to import
  if (!data || data.length === 0) {
    showImportOption();
    return;
  }

  seasons = data;
  currentSeason = seasons[seasons.length - 1];
  buildSeasonTabs();
  loadSeasonData();
}

function showImportOption() {
  document.getElementById('statsGrid').innerHTML = '';
  document.getElementById('playerTableArea').innerHTML = `
    <div style="background:white;border-radius:12px;padding:32px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);">
      <div style="font-size:32px;margin-bottom:12px;">📁</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Keine Daten vorhanden</div>
      <div style="font-size:13px;color:#ADB5BD;margin-bottom:20px;">Importiere die bestehenden Daten aus der Excel-Datei oder lege eine neue Saison an.</div>
      <button onclick="showModal('import')" style="padding:10px 22px;border-radius:8px;border:none;background:#2D6A4F;color:white;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;margin-right:8px;">📥 Historische Daten importieren</button>
      <button onclick="showModal('newSeason')" style="padding:10px 22px;border-radius:8px;border:1px solid #DEE2E6;background:white;font-family:inherit;font-size:13px;cursor:pointer;">+ Neue Saison</button>
    </div>`;
}

async function loadSeasonData() {
  if (!currentSeason) return;
  document.getElementById('playerTableArea').innerHTML = '<div class="spinner"></div>';

  const [playersRes, eventsRes] = await Promise.all([
    sb.from('players').select('*').eq('season_id', currentSeason.id).order('name'),
    sb.from('events').select('*').eq('season_id', currentSeason.id).order('date')
  ]);

  if (playersRes.error || eventsRes.error) { showToast('Ladefehler', 'error'); return; }

  currentSeason._players = playersRes.data || [];
  currentSeason._events = eventsRes.data || [];

  if (currentSeason._players.length > 0 && currentSeason._events.length > 0) {
    const attRes = await sb.from('attendance')
      .select('*, players(name)')
      .in('player_id', currentSeason._players.map(p => p.id));
    currentSeason._attendance = attRes.data || [];
  } else {
    currentSeason._attendance = [];
  }

  renderStats();
  renderPlayerTable();
  renderEingabe();
  renderDashboard();
}

// ═══════════════════════════════════════════════════════
// SAISON: STATS
// ═══════════════════════════════════════════════════════
function renderStats() {
  const s = currentSeason;
  const trainings = (s._events || []).filter(e => e.type === 'Training').length;
  const spiele = (s._events || []).filter(e => e.type !== 'Training').length;
  const players = s._players || [];
  const att = s._attendance || [];

  // avg training attendance
  let avgAtt = 0;
  if (trainings > 0 && players.length > 0) {
    const tEvents = (s._events || []).filter(e => e.type === 'Training').map(e => e.id);
    const perPlayer = players.map(p => {
      const jaCount = att.filter(a => a.player_id === p.id && tEvents.includes(a.event_id) && a.status === 'ja').length;
      return jaCount / trainings;
    });
    avgAtt = Math.round(perPlayer.reduce((a,b) => a+b, 0) / players.length * 100);
  }

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Spieler</div><div class="stat-value">${players.length}</div><div class="stat-sub">${s.team} ${s.saison}</div></div>
    <div class="stat-card"><div class="stat-label">Trainings</div><div class="stat-value">${trainings}</div><div class="stat-sub">Einheiten</div></div>
    <div class="stat-card"><div class="stat-label">Spiele</div><div class="stat-value">${spiele}</div><div class="stat-sub">inkl. Testspiele</div></div>
    <div class="stat-card"><div class="stat-label">Ø Anwesenheit</div><div class="stat-value">${avgAtt || '–'}${avgAtt ? '%' : ''}</div><div class="stat-sub">Training</div></div>
  `;
}

function setFilt(f) {
  filt = f;
  ['fa','ft','fs'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(f === 'all' ? 'fa' : f === 'training' ? 'ft' : 'fs').classList.add('active');
  renderPlayerTable();

function filterPlayers() { renderPlayerTable(); }

function renderPlayerTable() {
  const s = currentSeason;
  const q = document.querySelector('#view-saison .search-input')?.value?.toLowerCase() || '';
  const players = (s._players || []).filter(p => p.name.toLowerCase().includes(q));
  const att = s._attendance || [];
  const trainings = (s._events || []).filter(e => e.type === 'Training');
  const spiele = (s._events || []).filter(e => e.type !== 'Training');
  const tIds = trainings.map(e => e.id);
  const sIds = spiele.map(e => e.id);

  const enriched = players.map(p => {
    const tCount = att.filter(a => a.player_id === p.id && tIds.includes(a.event_id) && a.status === 'ja').length;
    const sCount = att.filter(a => a.player_id === p.id && sIds.includes(a.event_id) && a.status === 'ja').length;
    return { ...p, tCount, sCount };
  }).sort((a,b) => b.tCount - a.tCount);

  const showT = filt !== 'spiel';
  const showS = filt !== 'training';

  let html = `<div class="table-wrap"><table><thead><tr>
    <th>Name</th>
    ${showT ? `<th>Training</th><th>Quote</th>` : ''}
    ${showS ? `<th>Spiele</th><th>Quote</th>` : ''}
    <th></th>
  </tr></thead><tbody>`;

  for (const p of enriched) {
    const tp = trainings.length > 0 ? Math.round(p.tCount / trainings.length * 100) : 0;
    const sp = spiele.length > 0 ? Math.round(p.sCount / spiele.length * 100) : 0;
    const tc = tp >= 75 ? 'bg' : tp >= 50 ? 'ba' : 'br';
    const sc = sp >= 75 ? 'bg' : sp >= 50 ? 'ba' : 'br';
    html += `<tr onclick="openPlayer('${p.id}')">
      <td class="pname">${p.name}</td>
      ${showT ? `<td><b>${p.tCount}</b><span style="color:var(--g5)"> / ${trainings.length}</span></td>
        <td><div class="pct-bar"><div class="bar-track"><div class="bar-fill ${tc}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div></td>` : ''}
      ${showS ? `<td><b>${p.sCount}</b><span style="color:var(--g5)"> / ${spiele.length}</span></td>
        <td><div class="pct-bar"><div class="bar-track"><div class="bar-fill ${sc}" style="width:${sp}%"></div></div><span class="pct-val">${sp}%</span></div></td>` : ''}
      <td style="text-align:right;"><span style="color:var(--g5);font-size:16px;">›</span></td>
    </tr>`;
  }
  html += '</tbody></table></div>';

  html += `<div style="display:flex;gap:8px;margin-bottom:20px;">
    <button onclick="showModal('addPlayer')" class="add-btn">+ Spieler hinzufügen</button>
    <button onclick="showModal('addEvent')" class="add-btn" style="background:var(--amber);">+ Training / Spiel eintragen</button>
  </div>`;

  document.getElementById('playerTableArea').innerHTML = html;
}

function openPlayer(pid) {

  if (!player) return;

  document.getElementById('saisonPlayerList').style.display = 'none';
  const det = document.getElementById('playerDetailArea');
  det.style.display = '';

  const att = s._attendance || [];
  const trainings = (s._events || []).filter(e => e.type === 'Training');
  const spiele = (s._events || []).filter(e => e.type !== 'Training');
  const tCount = att.filter(a => a.player_id === pid && trainings.map(e=>e.id).includes(a.event_id) && a.status === 'ja').length;
  const sCount = att.filter(a => a.player_id === pid && spiele.map(e=>e.id).includes(a.event_id) && a.status === 'ja').length;
  const tp = trainings.length > 0 ? Math.round(tCount / trainings.length * 100) : 0;
  const sp = spiele.length > 0 ? Math.round(sCount / spiele.length * 100) : 0;

  const heatmap = events.map(e => {
    const a = att.find(a => a.player_id === pid && a.event_id === e.id);

  det.innerHTML = `
    <button class="back-btn" onclick="closePlayer()">← Übersicht</button>
    <div class="player-header">
      <div class="player-avatar">${initials}</div>
      <div>
        <div style="font-size:18px;font-weight:600;">${player.name}</div>

        <div class="pct-bar" style="margin-top:8px;"><div class="bar-track" style="max-width:100px;"><div class="bar-fill ${tp>=75?'bg':tp>=50?'ba':'br'}" style="width:${tp}%"></div></div><span class="pct-val">${tp}%</span></div>
      </div>
      <div class="sc"><div class="sc-title">Spiele</div>
        <div class="big-num" style="color:var(--amber)">${sCount}<span style="font-size:16px;color:var(--g5)"> / ${spiele.length}</span></div>

function renderDashboard() {

    const sp = (s._events || []).filter(e => e.type !== 'Training').length;

    const att = s._attendance || [];
    const tIds = (s._events||[]).filter(e=>e.type==='Training').map(e=>e.id);
    const avg = tr > 0 && pl.length > 0
      ? Math.round(pl.reduce((a,p) => a + att.filter(x=>x.player_id===p.id&&tIds.includes(x.event_id)&&x.status==='ja').length, 0) / pl.length / tr * 100)
      : null;
    return { ...s, tr, sp, playerCount: pl.length, avg };

  const cs = currentSeason;
  const att = cs._attendance || [];

      <div class="dash-card">
        <div class="dash-title">Top Spiele – ${cs.team} ${cs.saison}</div>
        ${topS.map((p,i)=>`<div class="rank-item"><span class="rn">${i+1}.</span><span class="rname">${p.name}</span><span class="rval">${p.val}</span></div>`).join('')}
      </div>
      <div class="dash-card" style="grid-column:span 2;">
        <div class="dash-title">Saison-Überblick</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr>
            <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Saison</th>
            <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Spieler</th>
            <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Trainings</th>
            <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Spiele</th>
            <th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--g5);text-transform:uppercase;border-bottom:1px solid var(--g2);">Ø Anwesenheit</th>
          </tr></thead>
          <tbody>${allSeasonData.map(s=>`<tr style="border-bottom:1px solid var(--g1);">
            <td style="padding:9px 10px;font-weight:500;">${s.team} ${s.saison}</td>
            <td style="padding:9px 10px;">${s.playerCount}</td>
            <td style="padding:9px 10px;">${s.tr}</td>

      </div>
    </div>`;
}

// ── Attendance state tracking ──
const pendingAtt = {};
function setAtt(pid, eid, status) {
  if (!pendingAtt[eid]) pendingAtt[eid] = {};
  pendingAtt[eid][pid] = status;
  const row = document.getElementById(`arow-${pid}`);
  if (!row) return;
  row.querySelectorAll('.att-btn').forEach(b => {
    b.className = 'att-btn ' + b.textContent.trim().split(' ')[0].toLowerCase().replace('✓','ja').replace('✗','nein').replace('–','na');
  });
  // highlight active
  row.querySelectorAll('.att-btn').forEach(b => {
    const s = b.classList.contains('ja') ? 'ja' : b.classList.contains('nein') ? 'nein' : 'na';
    if (s === status) b.classList.add(status);
  });
}

async function saveAllAttendance(eid) {
  if (!pendingAtt[eid]) { closeModal(); return; }
  const upserts = Object.entries(pendingAtt[eid]).map(([pid, status]) => ({
    player_id: pid, event_id: eid, status
  }));
  const { error } = await sb.from('attendance').upsert(upserts, { onConflict: 'player_id,event_id' });
  if (error) { showToast('Fehler beim Speichern', 'error'); return; }
  showToast('Anwesenheit gespeichert ✓', 'success');
  delete pendingAtt[eid];
  closeModal();
  await loadSeasonData();
}

async function saveSeason() {
  const team = document.getElementById('mTeam').value;
  const saison = document.getElementById('mSaison').value.trim();
  if (!saison) return;
  const { data, error } = await sb.from('seasons').insert({ team, saison }).select().single();
  if (error) { showToast('Fehler: ' + error.message, 'error'); return; }
  seasons.push({ ...data, _players: [], _events: [], _attendance: [] });
  currentSeason = seasons[seasons.length - 1];
  buildSeasonTabs();
  closeModal();
  renderStats(); renderPlayerTable(); renderEingabe();
  showToast('Saison angelegt ✓', 'success');
}

async function savePlayer(editId) {
  const name = document.getElementById('mPlayerName').value.trim();
  if (!name) return;
  if (editId) {
    const { error } = await sb.from('players').update({ name }).eq('id', editId);
    if (error) { showToast('Fehler', 'error'); return; }
    const p = currentSeason._players.find(p => p.id === editId);
    if (p) p.name = name;
  } else {
    const { data, error } = await sb.from('players').insert({ name, season_id: currentSeason.id }).select().single();
    if (error) { showToast('Fehler', 'error'); return; }
    currentSeason._players.push(data);
  }
  closeModal();
  closePlayer();
  renderPlayerTable();
  renderEingabe();
  showToast('Spieler gespeichert ✓', 'success');
}

async function saveEvent() {
  const type = document.getElementById('mEvType').value;
  const date = document.getElementById('mEvDate').value;
  if (!date) return;
  const { data, error } = await sb.from('events').insert({ type, date, season_id: currentSeason.id }).select().single();
  if (error) { showToast('Fehler', 'error'); return; }
  currentSeason._events.push(data);
  closeModal();
  renderStats();
  renderPlayerTable();
  renderEingabe();
  showToast('Eingetragen – jetzt Anwesenheit erfassen', 'success');
  setTimeout(() => showModal('attendance', data.id), 500);
}

    // Insert summary-based training/game events and players
    // Create dummy events based on counts
    const eventsToInsert = [];
    for (let i = 0; i < hs.trainings; i++) eventsToInsert.push({ season_id: season.id, type: 'Training', date: `2023-09-${String(i+1).padStart(2,'0')}`.replace('2023', hs.saison.includes('2025') ? '2025' : hs.saison.includes('2024') ? '2024' : '2023') });

    // Insert players
    const { data: players } = await sb.from('players').insert(hs.players.map(n => ({ name: n, season_id: season.id }))).select();

    // Insert attendance based on summary totals

      const player = (players||[]).find(p => p.name === sum.n);

      await sb.from('attendance').insert(attInserts.slice(i, i+500));
    }

    seasons.push({ ...season, _players: players||[], _events: events||[], _attendance: [] });
    imported++;
  }

  status.textContent = `✓ ${imported} Saisons importiert!`;
  currentSeason = seasons[seasons.length - 1];
  buildSeasonTabs();
  await loadSeasonData();
  closeModal();
  showToast('Import abgeschlossen ✓', 'success');
}

// VIEW NAVIGATION
// ═══════════════════════════════════════════════════════
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const idx = { saison: 0, eingabe: 1, dashboard: 2 };
  document.querySelectorAll('#mainNav .nav-btn')[idx[v]]?.classList.add('active');
  document.getElementById('seasonBar').style.display = v === 'saison' ? '' : 'none';
  if (v === 'eingabe') renderEingabe();
  if (v === 'dashboard') renderDashboard();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='success') {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 3000);
}
